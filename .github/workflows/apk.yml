                <circle class="bg" cx="85" cy="85" r="75"></circle>
                <circle class="progress" id="progressCircle" cx="85" cy="85" r="75"></circle>
              </svg>
              <div class="icon" id="statusIcon">🛡️</div>
            </div>
            <div class="scan-status" id="scanStatus">Scanning apps...</div>
            <div class="scan-detail" id="scanDetail">Checking 0 apps</div>
            <div class="percent" id="percentDisplay">0%</div>
            <div class="time" id="timeDisplay">45s</div>
            <div class="action-area">
              <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
              <button class="btn btn-home white" id="homeBtn">Back to Home</button>
            </div>
          </div>
          <script>
            (function() {
              const TOTAL_SECONDS = 45;
              const CIRCUMFERENCE = 471;
              const APP_NAMES = ['Chrome','Gmail','Maps','YouTube','Drive','Photos','Messages','Calendar','Keep','Duo','Play Store','Assistant','Home','Weather'];
              const container = document.getElementById('mainContainer');
              const circle = document.getElementById('progressCircle');
              const percentEl = document.getElementById('percentDisplay');
              const timeEl = document.getElementById('timeDisplay');
              const scanStatus = document.getElementById('scanStatus');
              const scanDetail = document.getElementById('scanDetail');
              const statusIcon = document.getElementById('statusIcon');
              const cancelBtn = document.getElementById('cancelBtn');
              const homeBtn = document.getElementById('homeBtn');
              let secondsLeft = TOTAL_SECONDS;
              let intervalId = null;
              let isFinished = false;
              let isCancelled = false;

              function updateDisplay(percent) {
                const clamped = Math.min(100, Math.max(0, percent));
                const percentInt = Math.round(clamped);
                const offset = CIRCUMFERENCE - (percentInt / 100) * CIRCUMFERENCE;
                circle.style.strokeDashoffset = offset;
                percentEl.textContent = percentInt + '%';
                const displaySec = Math.max(0, secondsLeft);
                timeEl.textContent = displaySec + 's';
                const scanned = Math.min(14, Math.floor((percentInt / 100) * 14));
                const appName = APP_NAMES[scanned] || 'apps';
                if (percentInt < 100) {
                  scanDetail.textContent = 'Checking ' + (scanned + 1) + ' of 14 apps';
                  if (percentInt < 10) scanStatus.textContent = 'Scanning apps...';
                  else if (percentInt < 50) scanStatus.textContent = 'Analyzing ' + appName + '...';
                  else if (percentInt < 80) scanStatus.textContent = 'Deep scanning ' + appName + '...';
                  else scanStatus.textContent = 'Finalizing security check...';
                }
                if (percentInt >= 100) {
                  scanStatus.textContent = '100% clean — No threats found';
                  scanDetail.textContent = '14 apps checked · All safe';
                  statusIcon.textContent = '✅';
                  container.classList.add('success');
                  cancelBtn.classList.add('hide');
                  homeBtn.classList.add('show');
                } else {
                  container.classList.remove('success');
                  statusIcon.textContent = '🛡️';
                }
              }

              function finishUpdate() {
                if (isFinished) return;
                isFinished = true;
                if (intervalId) { clearInterval(intervalId); intervalId = null; }
                secondsLeft = 0;
                timeEl.textContent = '0s';
                percentEl.textContent = '100%';
                circle.style.strokeDashoffset = 0;
                container.classList.add('success');
                scanStatus.textContent = '100% clean — No threats found';
                scanDetail.textContent = '14 apps checked · All safe';
                statusIcon.textContent = '✅';
                cancelBtn.classList.add('hide');
                homeBtn.classList.add('show');
                setTimeout(function() { container.classList.add('done'); }, 300);
              }

              function tick() {
                if (isFinished || isCancelled) { if (intervalId) { clearInterval(intervalId); intervalId = null; } return; }
                secondsLeft = Math.max(0, secondsLeft - 1);
                const elapsed = TOTAL_SECONDS - secondsLeft;
                let percent = (elapsed / TOTAL_SECONDS) * 100;
                if (secondsLeft === 0) percent = 100;
                updateDisplay(percent);
                if (percent >= 100) finishUpdate();
              }

              function startTimer() {
                if (intervalId) { clearInterval(intervalId); intervalId = null; }
                isFinished = false; isCancelled = false;
                secondsLeft = TOTAL_SECONDS;
                container.classList.remove('success', 'done');
                cancelBtn.classList.remove('hide');
                homeBtn.classList.remove('show');
                cancelBtn.disabled = false;
                circle.style.strokeDashoffset = CIRCUMFERENCE;
                percentEl.textContent = '0%';
                timeEl.textContent = '45s';
                scanStatus.textContent = 'Scanning apps...';
                scanDetail.textContent = 'Checking 0 apps';
                statusIcon.textContent = '🛡️';
                container.classList.remove('success');
                updateDisplay(0);
                intervalId = setInterval(function() { tick(); }, 1000);
              }

              cancelBtn.addEventListener('click', function() {
                if (isFinished || isCancelled) return;
                isCancelled = true;
                if (intervalId) { clearInterval(intervalId); intervalId = null; }
                cancelBtn.disabled = true;
                cancelBtn.textContent = 'Cancelling...';
                scanStatus.textContent = 'Cancelling scan...';
                setTimeout(function() {
                  cancelBtn.textContent = 'Cancel';
                  cancelBtn.disabled = false;
                  isCancelled = false;
                  startTimer();
                }, 800);
              });

              homeBtn.addEventListener('click', function() {
                container.classList.add('done');
                setTimeout(function() { container.classList.remove('done'); startTimer(); }, 300);
              });

              startTimer();
              window.addEventListener('beforeunload', function() { if (intervalId) { clearInterval(intervalId); intervalId = null; } });
              document.addEventListener('visibilitychange', function() {
                if (document.hidden) return;
                if (!isFinished && !isCancelled && secondsLeft > 0) {
                  const elapsed = TOTAL_SECONDS - secondsLeft;
                  let percent = Math.min(100, (elapsed / TOTAL_SECONDS) * 100);
                  if (secondsLeft === 0) percent = 100;
                  updateDisplay(percent);
                  if (percent >= 100) finishUpdate();
                } else if (!isFinished && !isCancelled && secondsLeft === 0) {
                  finishUpdate();
                }
              });
            })();
          </script>
          </body>
          </html>
          EOF

      # ==================== BUILD APK ====================
      
      - name: Build APK
        run: |
          echo "🔨 Building APK..."
          chmod +x gradlew
          ./gradlew clean assembleDebug
          
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
              echo "✅ APK built successfully!"
              ls -la app/build/outputs/apk/debug/
          else
              echo "❌ APK build failed!"
              exit 1
          fi

      # ==================== UPLOAD APK ====================
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: facebook-ai-overlay
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
