              android:viewportWidth="512"
              android:viewportHeight="512">
              <path
                  android:fillColor="#3b82f6"
                  android:pathData="M256,168c-48.6,0-88,39.4-88,88s39.4,88 88,88s88-39.4 88-88S304.6,168 256,168z M256,312c-30.9,0-56-25.1-56-56s25.1-56 56-56s56,25.1 56,56S286.9,312 256,312z"/>
              <path
                  android:fillColor="#3b82f6"
                  android:pathData="M384.1,204.7c3.4-9.5 5.9-19.5 7.5-29.8l-29.4-29.4c-10.3,1.6-20.3,4.1-29.8,7.5c-3.9-1.7-7.9-3.2-12-4.6l6.4-41.4c-14.5-5.5-29.8-8.5-45.6-8.5c-15.8,0-31.1,3-45.6,8.5l6.4,41.4c-4.1,1.4-8.1,2.9-12,4.6c-9.5-3.4-19.5-5.9-29.8-7.5l-29.4,29.4c1.6,10.3 4.1,20.3 7.5,29.8c-1.7,3.9-3.2,7.9-4.6,12l-41.4-6.4c-5.5,14.5-8.5,29.8-8.5,45.6c0,15.8 3,31.1 8.5,45.6l41.4-6.4c1.4,4.1 2.9,8.1 4.6,12c-3.4,9.5-5.9,19.5-7.5,29.8l29.4,29.4c10.3-1.6,20.3-4.1,29.8-7.5c3.9,1.7 7.9,3.2 12,4.6l-6.4,41.4c14.5,5.5 29.8,8.5 45.6,8.5c15.8,0 31.1-3 45.6-8.5l-6.4-41.4c4.1-1.4 8.1-2.9 12-4.6c9.5,3.4 19.5,5.9 29.8,7.5l29.4-29.4c-1.6-10.3-4.1-20.3-7.5-29.8c1.7-3.9 3.2-7.9 4.6-12l41.4,6.4c5.5-14.5 8.5-29.8 8.5-45.6c0-15.8-3-31.1-8.5-45.6l-41.4,6.4c-1.4-4.1-2.9-8.1-4.6-12z M256,344c-48.6,0-88-39.4-88-88s39.4-88 88-88s88,39.4 88,88S304.6,344 256,344z"/>
