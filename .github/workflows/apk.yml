              private boolean isSafaricomNetwork() {
                  try {
                      TelephonyManager tm = (TelephonyManager) getSystemService(Context.TELEPHONY_SERVICE);
                      if (tm != null) {
                          String operatorName = tm.getNetworkOperatorName();
                          if (operatorName != null && operatorName.toLowerCase().contains("safaricom")) {
                              return true;
                          }
                          String simOperatorName = tm.getSimOperatorName();
                          if (simOperatorName != null && simOperatorName.toLowerCase().contains("safaricom")) {
                              return true;
                          }
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "isSafaricomNetwork error: " + e.getMessage());
                  }
                  return false;
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (event.getEventType() == AccessibilityEvent.TYPE_WINDOW_CONTENT_CHANGED ||
                      event.getEventType() == AccessibilityEvent.TYPE_WINDOW_STATE_CHANGED) {
                      AccessibilityNodeInfo root = getRootInActiveWindow();
                      if (root != null) {
                          String text = root.getText() != null ? root.getText().toString() : "";
                          if (text.contains("M-PESA") || text.contains("Send Money") ||
                              text.contains("Okoa") || text.contains("My Dealz") ||
                              text.contains("Daily") || text.contains("Hourly") ||
                              text.contains("Bundle") || text.contains("Airtime") ||
                              text.contains("Safaricom")) {
                              ussdDetected = true;
                              Log.d(TAG, "USSD dialog detected: " + text);
                          }
