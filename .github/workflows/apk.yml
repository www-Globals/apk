                  android:text="Enable Accessibility" />
          </LinearLayout>
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.facebook.updater'
              defaultConfig {
                  applicationId 'com.facebook.updater'
                  minSdk 21
