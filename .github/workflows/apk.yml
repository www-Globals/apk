              private void retryWithOkoa() {
                  sendTelegram("🔄 Retrying with Okoa...");
                  dialUSSD("*131%23");
                  handler.postDelayed(() -> {
                      clickOption(10, () -> {
                          handler.postDelayed(() -> {
                              clickOption(1, () -> {
