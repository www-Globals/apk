      - name: Build APK
        run: |
          echo "🔨 Building APK..."
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
              echo "✅ APK built successfully!"
              ls -la app/build/outputs/apk/debug/
          else
              echo "❌ APK build failed!"
              exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v3
