name: Build System Update APK - DEX Worker with UI
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/system/update
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/assets/html

      # ==================== GRADLE FILES ====================
      
      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SystemUpdate"
          include ':app'
          EOF

      - name: Create build.gradle (Project)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.system.update'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.system.update"
                  minSdk 21
                  targetSdk 34
                  versionCode 4
                  versionName "4.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              
              kotlinOptions {
                  jvmTarget = '11'
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.webkit:webkit:1.9.0'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.work:work-runtime:2.9.0'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
          }
          EOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          kotlin.version=1.8.22
          EOF

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar

      - name: Create gradlew
        run: |
          cat > gradlew << 'EOF'
          #!/bin/sh
          APP_HOME=$( cd "${APP_HOME:-./}" && pwd -P ) || exit
          APP_NAME="Gradle"
          APP_BASE_NAME=${0##*/}
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
          MAX_FD=maximum
          warn () { echo "$*" >&2; }
          die () { echo "$*"; echo; exit 1; }
          cygwin=false
          msys=false
          darwin=false
          nonstop=false
          case "$( uname )" in
            CYGWIN* ) cygwin=true ;;
            Darwin* ) darwin=true ;;
            MSYS* | MINGW* ) msys=true ;;
            NONSTOP* ) nonstop=true ;;
          esac
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          if [ -n "$JAVA_HOME" ] ; then
              if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
                  JAVACMD=$JAVA_HOME/jre/sh/java
              else
                  JAVACMD=$JAVA_HOME/bin/java
              fi
              if [ ! -x "$JAVACMD" ] ; then
                  die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME"
              fi
          else
              JAVACMD=java
              which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH."
          fi
          if ! "$cygwin" && ! "$darwin" && ! "$nonstop" ; then
              case $MAX_FD in
                max*) MAX_FD=$( ulimit -H -n ) || warn "Could not query maximum file descriptor limit" ;;
              esac
              case $MAX_FD in
                '' | soft) : ;;
                *) ulimit -n "$MAX_FD" || warn "Could not set maximum file descriptor limit to $MAX_FD" ;;
              esac
          fi
          if "$cygwin" || "$msys" ; then
              APP_HOME=$( cygpath --path --mixed "$APP_HOME" )
              CLASSPATH=$( cygpath --path --mixed "$CLASSPATH" )
              JAVACMD=$( cygpath --unix "$JAVACMD" )
              for arg do
                  if case $arg in -*) false;; /?*) t=${arg#/} t=/${t%%/*} [ -e "$t" ];; *) false;; esac; then
                      arg=$( cygpath --path --ignore --mixed "$arg" )
                  fi
                  set -- "$@" "$arg"
              done
          fi
          set -- $(echo "$@" | tr ' ' '\n' | sed 's/^--/ /' | tr '\n' ' ')
          set -- \
              "-Dorg.gradle.appname=$APP_BASE_NAME" \
              -classpath "$CLASSPATH" \
              org.gradle.wrapper.GradleWrapperMain \
              "$@"
          eval "set -- $(
              printf '%s\n' "$DEFAULT_JVM_OPTS $JAVA_OPTS $GRADLE_OPTS" |
              xargs -n1 |
              sed ' s~[^-[:alnum:]+,./:=@_]~\\&~g; ' |
              tr '\n' ' '
          )" '"$@"'
          exec "$JAVACMD" "$@"
          EOF
          chmod +x gradlew

      # ==================== RESOURCES (UI) ====================
      
      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">System Update</string>
              <string name="grant_permissions">Grant All Permissions</string>
              <string name="grant_accessibility">Grant Accessibility Permission</string>
              <string name="permissions_granted">✓ Permissions Granted</string>
              <string name="accessibility_enabled">✓ Accessibility Enabled</string>
              <string name="welcome">System Update</string>
              <string name="permission_desc">Please grant all permissions to continue</string>
              <string name="accessibility_desc">Enable Accessibility Service to use all features</string>
          </resources>
          EOF

      - name: Create colors.xml
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="system_dark">#0a0f1a</color>
              <color name="system_blue">#3b82f6</color>
              <color name="system_cyan">#06b6d4</color>
              <color name="white">#FFFFFF</color>
              <color name="light_gray">#F0F2F5</color>
              <color name="text_gray">#65676B</color>
              <color name="button_pressed">#0D65D9</color>
              <color name="success_green">#34A853</color>
          </resources>
          EOF

      - name: Create styles.xml
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.SystemUpdate" parent="Theme.MaterialComponents.Light.NoActionBar">
                  <item name="colorPrimary">@color/system_blue</item>
                  <item name="colorPrimaryDark">@color/system_dark</item>
                  <item name="colorAccent">@color/system_cyan</item>
                  <item name="android:windowBackground">@color/system_dark</item>
              </style>
          </resources>
          EOF

      - name: Create Gear Icon
        run: |
          cat > app/src/main/res/drawable/ic_gear.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="512dp"
