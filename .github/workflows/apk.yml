                  android:background="@drawable/system_button"
                  android:layout_marginBottom="16dp"
                  app:icon="@drawable/ic_success"
                  app:iconGravity="textEnd"
                  app:iconTint="@color/white"/>

              <com.google.android.material.button.MaterialButton
                  android:id="@+id/btnGrantAccessibility"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:text="@string/grant_accessibility"
                  android:textSize="16sp"
                  android:textColor="@color/system_blue"
                  android:background="@drawable/system_button_outline"
                  app:icon="@drawable/ic_success"
                  app:iconGravity="textEnd"
